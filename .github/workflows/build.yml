name: Build and Push

on:
  workflow_dispatch:
    # Builds are now done locally using scripts/ — trigger this workflow
    # manually only when you need CI-built artifacts.
    # Local build scripts:
    #   go2rtc binaries : scripts/build.sh (Linux/Mac) or scripts/build.cmd (Windows)
    #   yolo_counter    : scripts/build_yolo_linux.sh (Linux)
    #                     scripts/build_yolo_win.bat  (Windows CPU)
    # NOTE: Windows GPU (CUDA) build is done locally only — see yolo_counter/BUILD_GUIDE.md

jobs:
  build-binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    env: { CGO_ENABLED: 0 }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with: { go-version: '1.25' }

      - name: Build go2rtc_win64
        env: { GOOS: windows, GOARCH: amd64 }
        run: go build -ldflags "-s -w" -trimpath
      - name: Upload go2rtc_win64
        uses: actions/upload-artifact@v4
        with: { name: go2rtc_win64, path: go2rtc.exe }

      - name: Build go2rtc_linux_amd64
        env: { GOOS: linux, GOARCH: amd64 }
        run: go build -ldflags "-s -w" -trimpath
      - name: Upload go2rtc_linux_amd64
        uses: actions/upload-artifact@v4
        with: { name: go2rtc_linux_amd64, path: go2rtc }

  build-yolo-win64:
    name: Build yolo_counter.exe (Windows x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install CPU-only PyTorch (lighter build)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install ultralytics, opencv, web stack, PyInstaller
        run: pip install ultralytics opencv-python-headless fastapi "uvicorn[standard]" pyinstaller

      - name: Build yolo_counter.exe
        run: pyinstaller --onefile --name yolo_counter yolo_counter/counter.py

      - name: Upload yolo_counter_win64
        uses: actions/upload-artifact@v4
        with:
          name: yolo_counter_win64
          path: dist\yolo_counter.exe

  build-yolo-linux64:
    name: Build yolo_counter (Linux x64)
    runs-on: ubuntu-22.04
    container:
      image: python:3.11-slim-bullseye
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system libs
        run: apt-get update -y && apt-get install -y libglib2.0-0 libgl1 binutils

      - name: Install CPU-only PyTorch (lighter build)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install ultralytics, opencv, web stack, PyInstaller
        run: pip install ultralytics opencv-python-headless fastapi "uvicorn[standard]" pyinstaller

      - name: Build yolo_counter
        run: pyinstaller --onefile --name yolo_counter yolo_counter/counter.py

      - name: Upload yolo_counter_linux64
        uses: actions/upload-artifact@v4
        with:
          name: yolo_counter_linux64
          path: dist/yolo_counter

  build-yolo-linux64-gpu:
    name: Build yolo_counter (Linux x64, NVIDIA GPU)
    runs-on: ubuntu-22.04
    container:
      image: python:3.11-slim-bullseye
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system libs
        run: apt-get update -y && apt-get install -y libglib2.0-0 libgl1 binutils

      - name: Install CUDA-enabled PyTorch
        run: pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cu121

      - name: Install ultralytics, opencv, web stack, PyInstaller
        run: pip install --no-cache-dir ultralytics opencv-python-headless fastapi "uvicorn[standard]" pyinstaller

      - name: Build yolo_counter
        run: pyinstaller --onefile --name yolo_counter yolo_counter/counter.py

      - name: Upload yolo_counter_linux64_gpu
        uses: actions/upload-artifact@v4
        with:
          name: yolo_counter_linux64_gpu
          path: dist/yolo_counter
