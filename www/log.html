<!DOCTYPE html>

<style>
.log-toolbar { display:flex; align-items:center; gap:.5rem; margin-bottom:1rem; flex-wrap:wrap; }
.log-toolbar .spacer { flex:1; }
.log-count { font-size:.78rem; color:var(--text-muted); }

.log-wrap {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); overflow:hidden;
}
.log-table { width:100%; border-collapse:collapse; font-family:monospace; font-size:.78rem; }
.log-table th {
  position:sticky; top:0; background:var(--surface2);
  text-align:left; padding:.5rem .8rem; font-size:.7rem;
  text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted);
  border-bottom:1px solid var(--border); font-family:inherit;
}
.log-table td { padding:.3rem .8rem; border-bottom:1px solid var(--border-soft,var(--border)); vertical-align:top; }
.log-table tr:last-child td { border-bottom:none; }
.log-time  { white-space:nowrap; color:var(--text-muted); width:110px; }
.log-level { width:60px; }
.log-msg   { word-break:break-word; color:var(--text); }

.lv {
  display:inline-block; padding:.05rem .45rem; border-radius:4px;
  font-size:.68rem; font-weight:700; text-transform:uppercase;
}
.lv.trace { background:#37415122; color:#6b7280; }
.lv.debug { background:#4b556322; color:#9ca3af; }
.lv.info  { background:#1d4ed822; color:#60a5fa; }
.lv.warn  { background:#92400e22; color:#fbbf24; }
.lv.error, .lv.fatal, .lv.panic { background:#7f1d1d22; color:#f87171; }

.log-scroll { max-height:calc(100vh - 210px); overflow-y:auto; -webkit-overflow-scrolling:touch; }
.log-empty { text-align:center; color:var(--text-muted); padding:2.5rem; font-size:.85rem; }
@media (max-width:768px) {
  .topbar { flex-wrap:wrap; height:auto !important; padding:8px 12px !important; gap:6px; }
  .log-scroll { max-height:calc(100vh - 160px); overflow-x:auto; }
  .log-time { width:90px !important; }
  .log-level { width:48px !important; font-size:.73rem !important; }
  .log-table th { font-size:.75rem !important; }
}
</style>

      <button class="btn btn-sm" id="btnAuto">⏸ Auto-update: ON</button>
      <button class="btn btn-sm" id="btnReverse">↕ Newest first: ON</button>
      <select id="levelFilter" class="btn btn-sm" style="cursor:pointer">
        <option value="">All levels</option>
        <option value="trace">trace+</option>
        <option value="debug">debug+</option>
        <option value="info" selected>info+</option>
        <option value="warn">warn+</option>
        <option value="error">error</option>
      </select>
      <span class="spacer"></span>
      <span class="log-count" id="logCount">—</span>
      <button class="btn btn-sm" id="btnClean">🗑 Clean</button>
    </div>

    <div class="log-wrap">
      <div class="log-scroll" id="logScroll">
        <table class="log-table">
          <thead><tr><th class="log-time">Time</th><th class="log-level">Level</th><th>Message</th></tr></thead>

<script src="app.js"></script>
<script>
const LEVEL_ORDER = { trace:0, debug:1, info:2, warn:3, error:4, fatal:5, panic:6 };
let autoUpdate = true;
let newestFirst = true;
let minLevel = 'info';

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function parseLines(text) {
  const out = [];
  for (const raw of text.split('\n')) {
    const t = raw.trim();
    if (!t) continue;
    try { out.push(JSON.parse(t)); } catch(_) {}
  }
  return out;
}

function fmtLine(line) {
  const KEYS = ['time','level','message'];
  const ts = line.time ? new Date(line.time).toLocaleTimeString(undefined, {
    hour:'numeric', minute:'numeric', second:'numeric', fractionalSecondDigits:3,
  }) : '—';
  let msg = line.message || '';
  for (const k of Object.keys(line)) {
    if (!KEYS.includes(k)) msg += ` ${k}=${line[k]}`;
  }
  const lv = line.level || 'info';
  return `<tr>
    <td class="log-time">${escHtml(ts)}</td>
    <td class="log-level"><span class="lv ${escHtml(lv)}">${escHtml(lv)}</span></td>
    <td class="log-msg">${escHtml(msg)}</td>
  </tr>`;
}

async function reload() {
  try {
    const token = getToken();
    const res = await fetch('/api/log', token ? { headers: { Authorization: 'Bearer ' + token } } : {});
    if (res.status === 401) { window.location.href = '/login.html'; return; }
    if (!res.ok) throw new Error(await res.text().catch(() => res.statusText));
    const text = await res.text();
    let lines = parseLines(text);

    const min = LEVEL_ORDER[minLevel] ?? 0;
    lines = lines.filter(l => (LEVEL_ORDER[l.level] ?? 2) >= min);

    if (newestFirst) lines = lines.reverse();

    document.getElementById('logCount').textContent = lines.length + ' entries';
    document.getElementById('logBody').innerHTML = lines.length
      ? lines.map(fmtLine).join('')
      : '<tr><td colspan="3" class="log-empty">No log entries.</td></tr>';
  } catch(e) {
    document.getElementById('logBody').innerHTML =
      `<tr><td colspan="3" class="log-empty">Cannot load logs: ${escHtml(e.message)}</td></tr>`;
  }
}

document.getElementById('btnClean').addEventListener('click', async () => {
  if (!confirm('Delete all server logs?')) return;
  try {
    await apiFetch('/api/log', { method: 'DELETE' });
    await reload();
  } catch(e) { alert('Clean failed: ' + e.message); }
});

document.getElementById('btnAuto').addEventListener('click', () => {
  autoUpdate = !autoUpdate;
  document.getElementById('btnAuto').textContent =
    (autoUpdate ? '⏸' : '▶') + ' Auto-update: ' + (autoUpdate ? 'ON' : 'OFF');
});

document.getElementById('btnReverse').addEventListener('click', () => {
  newestFirst = !newestFirst;
  document.getElementById('btnReverse').textContent =
    '↕ Newest first: ' + (newestFirst ? 'ON' : 'OFF');
  reload();
});

document.getElementById('levelFilter').addEventListener('change', e => {
  minLevel = e.target.value || 'trace';
  reload();
});

// ── Boot ──
(async () => {
  await initApp('log');
  const user = getUser();
  if (!user || !hasTab('log')) { window.location.href = '/'; return; }
  await reload();
  setInterval(() => { if (autoUpdate) reload(); }, 5000);
})();
</script>
