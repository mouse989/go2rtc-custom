<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UTMC Camera — Dashboard</title>
<link rel="stylesheet" href="app.css">
<style>
/* player */
#playerWrap video-stream { width:100%;aspect-ratio:16/9;display:block;background:#000;border-radius:6px;overflow:hidden; }
#playerWrap video-stream::part(video){width:100%;height:100%;}
#playerWrap img.modal-snap{width:100%;aspect-ratio:16/9;display:block;background:#000;border-radius:6px;object-fit:contain;}
.snap-bar{display:flex;align-items:center;justify-content:space-between;margin-top:.4rem;font-size:.72rem;color:var(--text-muted);}
.snap-countdown{font-variant-numeric:tabular-nums;}
.mode-tabs{display:flex;gap:.4rem;margin-bottom:.75rem;flex-wrap:wrap;}
.mode-tab{padding:.3rem .75rem;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:.82rem;font-weight:600;cursor:pointer;transition:border-color .15s,color .15s;}
.mode-tab:hover{color:var(--text);border-color:var(--text-muted);}
.mode-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(47,129,247,.08);}

/* card */
.cam-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;background:var(--surface2);border-radius:6px 6px 0 0;}
.cam-preview{width:100%;height:100%;object-fit:cover;display:block;background:#111;}
img.cam-preview{cursor:default;}
.thumb-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:.78rem;pointer-events:none;}
.thumb-ph.hide{display:none;}
.cam-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);transition:background .2s;z-index:2;}
.cam-card:hover .cam-overlay{background:rgba(0,0,0,.45);}
.play-btn{opacity:0;transform:scale(.8);transition:opacity .2s,transform .2s;background:rgba(255,255,255,.9);border:none;border-radius:50%;width:44px;height:44px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#0d1117;}
.cam-card:hover .play-btn{opacity:1;transform:scale(1);}
.play-btn svg{width:22px;height:22px;}
.cam-footer{display:flex;align-items:center;justify-content:space-between;padding:.45rem .6rem;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;}
.cam-name{font-size:.82rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cam-badge{font-size:.65rem;font-weight:700;padding:.1rem .35rem;border-radius:3px;background:#16a34a22;color:#4ade80;}
.thumb-refresh{position:absolute;bottom:.35rem;right:.35rem;z-index:3;background:rgba(0,0,0,.6);border:none;border-radius:4px;padding:.2rem .4rem;cursor:pointer;color:#fff;font-size:.72rem;opacity:0;transition:opacity .15s;}
.cam-card:hover .thumb-refresh{opacity:1;}
</style>
</head>

<script>
// ── State ─────────────────────────────────────────────────────────
let _currentStream = null;
let _currentToken  = null;
let _currentMode   = 'snapshot';
let _observer      = null;
let _snapshotTimer = null;   // setInterval handle for auto-refresh
let _snapshotImg   = null;   // <img> element inside modal

// name → {id, ws_url, hls_url, frame_url, ...}
let _proxyMap = {};

// ── Thumbnail URL builder ─────────────────────────────────────────
// Returns a URL that always yields image/jpeg — safe for <img> on any browser.
function frameUrl(name, token) {
  const info = _proxyMap[name];
  return info
    ? `/api/proxy/frame?id=${info.id}&token=${encodeURIComponent(token)}`
    : `/api/frame.jpeg?src=${encodeURIComponent(name)}&token=${encodeURIComponent(token)}`;
}

// ── Thumbnail lazy load ───────────────────────────────────────────
function initObserver(token) {
  _observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const thumb = entry.target;
      if (thumb.dataset.loaded) return;
      thumb.dataset.loaded = '1';
      loadThumb(thumb, token);
      _observer.unobserve(thumb);
    });
  }, { rootMargin: '200px' });
}

function loadThumb(thumb, token) {
  const name = thumb.dataset.name;
  const ph   = thumb.querySelector('.thumb-ph');
  const img  = thumb.querySelector('img.cam-preview');
  img.onload  = () => { if (ph) ph.classList.add('hide'); };
  img.onerror = () => { if (ph) ph.textContent = 'No snapshot'; };
  img.src = frameUrl(name, token) + '&ts=' + Date.now();
}

function refreshAllSnapshots() {
  const token = getToken();
  document.querySelectorAll('.cam-thumb[data-name]').forEach(th => {
    delete th.dataset.loaded;
    loadThumb(th, token);
  });
}

// ── Camera card ───────────────────────────────────────────────────
function createCameraCard(name, token) {
  const card = document.createElement('div');
  card.className = 'cam-card';
  card.dataset.search = name.toLowerCase();
  card.innerHTML = `
    <div class="cam-thumb" data-name="${escHtml(name)}">
      <img class="cam-preview" alt="" loading="lazy">
      <div class="thumb-ph">Loading…</div>
      <div class="cam-overlay">
        <button class="play-btn" aria-label="Open">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/>
          </svg>
        </button>
      </div>
      <button class="thumb-refresh" onclick="event.stopPropagation();refreshCard(this)">↺</button>
    </div>
    <div class="cam-footer">
      <span class="cam-name">${escHtml(name)}</span>
      <span class="cam-badge">LIVE</span>
    </div>`;
  card.querySelector('.play-btn').addEventListener('click', () => openModal(name, token));
  return card;
}

function refreshCard(btn) {
  const thumb = btn.closest('.cam-thumb');
  delete thumb.dataset.loaded;
  loadThumb(thumb, getToken());
}

// ── Snapshot player (modal default) ──────────────────────────────
const SNAP_INTERVAL = 10; // seconds between auto-refreshes

function showSnapshot(name, token) {
  stopSnapshot();
  const wrap = document.getElementById('playerWrap');
  wrap.innerHTML = '';
  wrap.style.display = 'block';

  const img = document.createElement('img');
  img.className = 'modal-snap';
  wrap.appendChild(img);

  const bar = document.createElement('div');
  bar.className = 'snap-bar';
  bar.innerHTML = '<span>🔄 auto-refresh</span><span class="snap-countdown"></span>';
  wrap.appendChild(bar);
  const countdown = bar.querySelector('.snap-countdown');

  _snapshotImg = img;

  function refresh() {
    img.src = frameUrl(name, token) + '&ts=' + Date.now();
  }

  refresh();

  let secs = SNAP_INTERVAL;
  countdown.textContent = secs + 's';
  _snapshotTimer = setInterval(() => {
    secs--;
    if (secs <= 0) { secs = SNAP_INTERVAL; refresh(); }
    countdown.textContent = secs + 's';
  }, 1000);
}

function stopSnapshot() {
  if (_snapshotTimer) { clearInterval(_snapshotTimer); _snapshotTimer = null; }
  if (_snapshotImg) { _snapshotImg.src = ''; _snapshotImg = null; }
}

// ── Live player ───────────────────────────────────────────────────
const _isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

function startPlayer(name, token, mode) {
  stopSnapshot();
  const wrap = document.getElementById('playerWrap');
  wrap.innerHTML = '';
  wrap.style.display = 'block';

  const info = _proxyMap[name];

  // iOS Safari: native <video> + HLS is the most reliable path for all codecs
  // including H.265. The WebSocket cascade works but native HLS is simpler/faster.
  if (_isIOS && (mode === 'webrtc,mse,hls' || mode === 'hls')) {
    const vid = document.createElement('video');
    Object.assign(vid, { autoplay: true, muted: true, controls: true, playsInline: true });
    vid.style.cssText = 'width:100%;aspect-ratio:16/9;display:block;background:#000;border-radius:6px;object-fit:contain;';
    if (info) {
      vid.src = `/api/proxy/hls?id=${encodeURIComponent(info.id)}&token=${encodeURIComponent(token)}`;
    } else {
      vid.src = `/api/hls/index.m3u8?src=${encodeURIComponent(name)}&token=${encodeURIComponent(token)}`;
    }
    wrap.appendChild(vid);
    return;
  }

  let wsUrl;
  if (info) {
    wsUrl = info.ws_url;
  } else {
    const u = new URL('/api/ws', location.href);
    u.protocol = u.protocol === 'https:' ? 'wss:' : 'ws:';
    u.searchParams.set('src', name);
    u.searchParams.set('token', token);
    wsUrl = u.toString();
  }

  const player = document.createElement('video-stream');
  player.mode = mode;
  player.background = false;
  player.src = wsUrl;
  wrap.appendChild(player);
}

// ── Modal ─────────────────────────────────────────────────────────
function openModal(name, token) {
  _currentStream = name;
  _currentToken  = token;
  document.getElementById('modalTitle').textContent = name;

  // Default: snapshot tab
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-mode="snapshot"]').classList.add('active');
  _currentMode = 'snapshot';
  showSnapshot(name, token);

  // Stream links (clean: Watch HD + HLS + Snapshot only)
  const info = _proxyMap[name];
  let links;
  if (info) {
    const base = location.origin;
    const t = encodeURIComponent(token);
    links = [
      { label: '⚡ Watch (HD)', url: `${base}/watch.html?id=${info.id}&token=${t}` },
      { label: '📺 HLS',        url: info.hls_url },
      { label: '📷 Snapshot',   url: info.frame_url },
    ];
  } else {
    const qs = `src=${encodeURIComponent(name)}&token=${encodeURIComponent(token)}`;
    links = [
      { label: '⚡ Watch (HD)', url: `/watch.html?${qs}` },
      { label: '📺 HLS',        url: `/api/hls/index.m3u8?${qs}` },
      { label: '📷 Snapshot',   url: `/api/frame.jpeg?${qs}` },
    ];
  }
  document.getElementById('streamLinks').innerHTML =
    links.map(l => `<a href="${escHtml(l.url)}" target="_blank" class="stream-link">${l.label}</a>`).join('');

  document.getElementById('modalBackdrop').classList.add('open');
  // Scale modal to fit screen height (small screens only)
  setTimeout(scaleModalToFit, 30);
}

document.getElementById('modeTabs').addEventListener('click', e => {
  const tab = e.target.closest('.mode-tab');
  if (!tab || !_currentStream) return;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  _currentMode = tab.dataset.mode;
  if (_currentMode === 'snapshot') {
    showSnapshot(_currentStream, _currentToken);
  } else {
    startPlayer(_currentStream, _currentToken, _currentMode);
  }
});

function closeModal() {
  stopSnapshot();
  const backdrop = document.getElementById('modalBackdrop');
  const modal = backdrop.querySelector('.modal');
  backdrop.classList.remove('open', 'scale-mode');
  if (modal) { modal.style.transform = ''; modal.style.marginBottom = ''; }
  document.getElementById('playerWrap').innerHTML = '';
  _currentStream = null;
}
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalBackdrop').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Group filter state ────────────────────────────────────────────
let _groups = [];           // [{name, cameras}]
let _camToGroups = {};      // camera name → [group names]
let _activeGroup = '__all__'; // currently selected group pill

function buildGroupMap() {
  _camToGroups = {};
  _groups.forEach(g => {
    (g.cameras || []).forEach(cam => {
      if (!_camToGroups[cam]) _camToGroups[cam] = [];
      _camToGroups[cam].push(g.name);
    });
  });
}

function renderGroupBar(allNames) {
  if (!_groups.length) return; // don't show bar if no groups
  const bar = document.getElementById('groupBar');

  // Count cameras per group (intersect with user's visible cameras)
  const nameSet = new Set(allNames);
  const groupCounts = {};
  _groups.forEach(g => {
    groupCounts[g.name] = (g.cameras || []).filter(c => nameSet.has(c)).length;
  });
  const ungroupedCount = allNames.filter(n => !_camToGroups[n] || !_camToGroups[n].length).length;

  bar.innerHTML = '';

  const mkPill = (key, label, count) => {
    const btn = document.createElement('button');
    btn.className = 'group-pill' + (_activeGroup === key ? ' active' : '');
    btn.dataset.group = key;
    btn.innerHTML = `${escHtml(label)}<span class="pill-count">${count}</span>`;
    btn.addEventListener('click', () => {
      _activeGroup = key;
      bar.querySelectorAll('.group-pill').forEach(p => p.classList.toggle('active', p.dataset.group === key));
      applyFilter();
    });
    bar.appendChild(btn);
  };

  mkPill('__all__', 'All', allNames.length);
  _groups.forEach(g => mkPill(g.name, g.name, groupCounts[g.name] || 0));
  if (ungroupedCount > 0) mkPill('__ungrouped__', 'Ungrouped', ungroupedCount);

  bar.style.display = 'flex';
}

function applyFilter() {
  const q = document.getElementById('camSearch').value.toLowerCase();
  document.querySelectorAll('.cam-card').forEach(card => {
    const matchSearch = !q || card.dataset.search.includes(q);
    let matchGroup = true;
    if (_activeGroup === '__ungrouped__') {
      const gs = JSON.parse(card.dataset.groups || '[]');
      matchGroup = gs.length === 0;
    } else if (_activeGroup !== '__all__') {
      const gs = JSON.parse(card.dataset.groups || '[]');
      matchGroup = gs.includes(_activeGroup);
    }
    card.style.display = matchSearch && matchGroup ? '' : 'none';
  });
}

document.getElementById('camSearch').addEventListener('input', applyFilter);
document.getElementById('layoutSelect').addEventListener('change', e => {
  document.getElementById('camGrid').dataset.cols = e.target.value;
});

// ── Modal auto-scale (fit screen height without scrolling) ────────
function scaleModalToFit() {
  const modal = document.querySelector('#modalBackdrop .modal');
  const backdrop = document.getElementById('modalBackdrop');
  if (!modal) return;
  modal.style.transform = '';
  modal.style.marginBottom = '';
  backdrop.classList.remove('scale-mode');
  requestAnimationFrame(() => {
    const avail = window.innerHeight - 32;
    const h = modal.offsetHeight;
    if (h > avail) {
      const s = avail / h;
      modal.style.transformOrigin = 'top center';
      modal.style.transform = `scale(${s})`;
      modal.style.marginBottom = `${-h * (1 - s)}px`;
      backdrop.classList.add('scale-mode');
    }
  });
}

// ── Boot ──────────────────────────────────────────────────────────
(async () => {
  await initApp('cameras');
  const token = getToken();

  const [streams, proxyStreams, groups] = await Promise.all([
    apiFetch('/api/streams').catch(() => ({})),
    apiFetch('/api/proxy/streams').catch(() => []),
    apiFetch('/api/groups').catch(() => []),
  ]);

  // Build name → proxyInfo map (name field is always present for all roles)
  (proxyStreams || []).forEach(s => { if (s.name) _proxyMap[s.name] = s; });

  // Build group map
  _groups = groups || [];
  buildGroupMap();

  document.getElementById('loadingState').style.display = 'none';

  const names = Object.keys(streams || {}).sort();
  if (!names.length) {
    document.getElementById('emptyState').style.display = 'flex';
    return;
  }

  const grid = document.getElementById('camGrid');
  grid.style.display = 'grid';
  initObserver(token);
  names.forEach(name => {
    const card = createCameraCard(name, token);
    // Attach group membership as data attribute for filtering
    card.dataset.groups = JSON.stringify(_camToGroups[name] || []);
    grid.appendChild(card);
    _observer.observe(card.querySelector('.cam-thumb'));
  });

  // Render group filter bar
  renderGroupBar(names);

  // Re-scale modal on window resize
  window.addEventListener('resize', () => {
    if (document.getElementById('modalBackdrop').classList.contains('open')) scaleModalToFit();
  });
})();
</script>
