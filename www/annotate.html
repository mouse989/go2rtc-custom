<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gán nhãn Dataset</title>
  <link rel="stylesheet" href="app.css">
  <script src="app.js"></script>
  <style>
    .ann-layout { display:flex; height:100%; overflow:hidden; }
    .ann-left { width:200px; flex-shrink:0; border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
    .ann-left-hdr { padding:8px 10px; font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-secondary); border-bottom:1px solid var(--border); flex-shrink:0; }
    .img-list { overflow-y:auto; flex:1; }
    .img-item { padding:6px 10px; font-size:0.75rem; cursor:pointer; border-bottom:1px solid var(--border); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .img-item:hover { background:var(--surface2); }
    .img-item.active { background:var(--accent); color:#fff; }
    .img-item.labeled { font-weight:600; }
    .ann-center { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
    .ann-center-hdr { padding:8px 14px; border-bottom:1px solid var(--border); font-size:0.82rem; color:var(--text-secondary); flex-shrink:0; display:flex; gap:8px; align-items:center; }
    .canvas-wrap { flex:1; overflow:auto; display:flex; align-items:flex-start; justify-content:flex-start; padding:12px; background:var(--bg); }
    canvas#annCanvas { border:1px solid var(--border); border-radius:4px; cursor:crosshair; display:block; }
    .ann-right { width:220px; flex-shrink:0; border-left:1px solid var(--border); overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:10px; }
    .rp-section { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px; }
    .rp-title { font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-secondary); margin-bottom:8px; }
    .cls-btn { display:flex; align-items:center; gap:6px; width:100%; padding:6px 8px; border-radius:6px; border:1.5px solid var(--border); background:none; color:var(--text); cursor:pointer; font-size:0.8rem; margin-bottom:4px; transition:border-color .15s; }
    .cls-btn:hover { border-color:var(--accent); }
    .cls-btn.active { border-color:currentColor; font-weight:700; }
    .cls-dot { width:12px; height:12px; border-radius:3px; flex-shrink:0; }
    .box-list { max-height:160px; overflow-y:auto; }
    .box-row { display:flex; align-items:center; gap:4px; padding:3px 4px; border-radius:4px; font-size:0.75rem; }
    .box-row:hover { background:var(--surface); }
    .box-del { background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:0.9rem; padding:0 2px; flex-shrink:0; }
    .box-del:hover { color:#dc2626; }
    .nav-row { display:flex; gap:6px; }
    .nav-row button { flex:1; }
    .collect-row { display:flex; gap:6px; align-items:center; }
    .collect-row select, .collect-row input { flex:1; min-width:0; font-size:0.78rem; }
    .cnt-header { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--border); flex-wrap:wrap; flex-shrink:0; }
    .cnt-header h2 { margin:0; font-size:1.0rem; flex:1; min-width:140px; }
    .status-msg { font-size:0.75rem; color:var(--text-secondary); padding:2px 0; min-height:1.1em; }
    @media (max-width:768px) {
      .ann-layout { flex-direction:column; height:auto; overflow:visible; }
      .ann-left {
        width:100% !important; height:auto; max-height:160px;
        overflow-y:auto; border-right:none; border-bottom:1px solid var(--border);
      }
      .ann-right {
        width:100% !important; height:auto; order:3;
        border-left:none; border-top:1px solid var(--border);
      }
      .canvas-wrap { height:56vw; min-height:200px; overflow:auto; order:2; }
      #annCanvas { max-width:100%; display:block; }
      .img-item { padding:8px 10px; font-size:.8rem; min-height:36px; }
      .box-row { padding:6px 8px; min-height:34px; }
      .box-del { padding:4px 8px; min-height:30px; }
      .cls-btn { padding:7px 10px; min-height:34px; }
    }
    @media (min-width:1280px) {
      .ann-left { width:240px; }
      .ann-right { width:260px; }
      .img-item { font-size:.8rem; padding:7px 12px; }
      .rp-title { font-size:.76rem; }
    }
  </style>
</head>

        <span style="flex:1"></span>
        <button class="btn btn-sm" id="btnPrev">&#8592; Trước</button>
        <span id="imgIdx" style="font-size:0.78rem;"></span>
        <button class="btn btn-sm" id="btnNext">Tiếp &#8594;</button>

      </div>
    </div>

    <!-- Right: controls -->

      <!-- Class selector -->

        <div class="rp-title">Loại xe</div>
        <button class="cls-btn active" data-cls="0" data-name="car" style="color:#16a34a;">
          <span class="cls-dot" style="background:#16a34a;"></span> 🚗 Ô tô

        <button class="cls-btn" data-cls="1" data-name="motorcycle" style="color:#a21caf;">

          <span class="cls-dot" style="background:#0e7490;"></span> 🚌 Xe buýt

        <button class="cls-btn" data-cls="3" data-name="truck" style="color:#d97706;">

      <!-- Box list -->

        <div class="rp-title">Hộp hiện tại (<span id="boxCount">0</span>)</div>

      </div>

        <div class="status-msg" id="saveMsg"></div>
      </div>

      <!-- Collect frames -->
      <div class="rp-section">
        <div class="rp-title">Thu thập ảnh</div>
        <div class="collect-row" style="margin-bottom:6px;">
          <select id="collectCam" style="flex:1;font-size:0.78rem;"></select>
        </div>
        <div class="collect-row" style="margin-bottom:6px;">
          <label style="font-size:0.75rem;color:var(--text-secondary);flex-shrink:0;">Số ảnh:</label>

</main>

<script>
// ── API helper ──
function getToken() { return localStorage.getItem('go2rtc_token') || ''; }
async function apiFetch(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json', ...(opts.headers || {}) },
    ...opts,
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── app init ──
document.addEventListener('DOMContentLoaded', async () => {
  await initApp('counting');
  await loadImages();
  await loadCameras();
  await loadTrainServers();
});

// ── class colors ──
const CLS_COLORS = { 0: '#16a34a', 1: '#a21caf', 2: '#0e7490', 3: '#d97706' };
const CLS_NAMES  = { 0: 'car', 1: 'motorcycle', 2: 'bus', 3: 'truck' };

// ── state ──
let images = [];
let currentIdx = -1;
let currentImg = null;  // HTMLImageElement
let boxes = [];         // [{cls_id, x1,y1,x2,y2}] in image pixels
let selectedCls = 0;
let drawing = false;
let dragStart = null;
let dragCurrent = null;
let _trainWorker  = ''; // worker ID selected at the time training was started

const canvas = document.getElementById('annCanvas');
const ctx = canvas.getContext('2d');

// ── sidebar toggle ──
document.getElementById('sidebarToggle')?.addEventListener('click', () => {
  document.getElementById('sidebar')?.classList.toggle('open');
});

// ── load image list ──
let labeledSet = new Set();
async function loadImages() {
  try {
    const d = await apiFetch('/api/counting/dataset-images');
    images = d.images || [];
    labeledSet = new Set(d.labeled || []);
    document.getElementById('imgCount').textContent = images.length;
    renderImageList();
    if (images.length > 0) loadImage(0);
    else { boxes = []; redraw && redraw(); }
  } catch (e) {
    setStatus('Lỗi tải danh sách ảnh: ' + e.message);
  }
}

function renderImageList() {
  const list = document.getElementById('imgList');
  list.innerHTML = '';
  images.forEach((name, i) => {
    const el = document.createElement('div');
    el.className = 'img-item' + (i === currentIdx ? ' active' : '') + (labeledSet.has(name) ? ' labeled' : '');
    el.textContent = (labeledSet.has(name) ? '✓ ' : '') + name;
    el.title = name;
    el.addEventListener('click', () => loadImage(i));
    list.appendChild(el);
  });
}

// ── load a single image ──
async function loadImage(idx) {
  if (idx < 0 || idx >= images.length) return;
  currentIdx = idx;
  boxes = [];
  renderImageList();

  const fname = images[idx];
  document.getElementById('imgName').textContent = fname;
  document.getElementById('imgIdx').textContent = `${idx+1} / ${images.length}`;

  await new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      currentImg = img;
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      resolve();
    };
    img.onerror = resolve;
    img.src = `/api/counting/dataset-image?file=${encodeURIComponent(fname)}`;
  });

  // Try loading existing labels (needs image dimensions, so after image loads)
  await loadLabels(fname);
}

async function loadLabels(fname) {
  boxes = [];
  try {
    const d = await apiFetch(`/api/counting/dataset-label?file=${encodeURIComponent(fname)}`);
    const w = currentImg ? currentImg.naturalWidth : canvas.width;
    const h = currentImg ? currentImg.naturalHeight : canvas.height;
    boxes = (d.boxes || []).map(b => ({
      cls_id: b.cls_id,
      x1: Math.round((b.x_center - b.width / 2) * w),
      y1: Math.round((b.y_center - b.height / 2) * h),
      x2: Math.round((b.x_center + b.width / 2) * w),
      y2: Math.round((b.y_center + b.height / 2) * h),
    }));
  } catch (e) {
    boxes = [];
  }
  renderBoxList();
  redraw();
}

// ── draw ──
function redraw() {
  if (!currentImg) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(currentImg, 0, 0);

  // Draw committed boxes
  boxes.forEach((b, i) => {
    const color = CLS_COLORS[b.cls_id] || '#fff';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.strokeRect(b.x1, b.y1, b.x2 - b.x1, b.y2 - b.y1);
    ctx.fillStyle = color + 'cc';
    ctx.fillRect(b.x1, b.y1, b.x2 - b.x1, 16);
    ctx.fillStyle = '#fff';
    ctx.font = '11px sans-serif';
    ctx.fillText(CLS_NAMES[b.cls_id] || '?', b.x1 + 3, b.y1 + 11);
  });

  // Draw in-progress box
  if (drawing && dragStart && dragCurrent) {
    const color = CLS_COLORS[selectedCls] || '#fff';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 3]);
    const x = Math.min(dragStart.x, dragCurrent.x);
    const y = Math.min(dragStart.y, dragCurrent.y);
    const w = Math.abs(dragCurrent.x - dragStart.x);
    const h = Math.abs(dragCurrent.y - dragStart.y);
    ctx.strokeRect(x, y, w, h);
    ctx.setLineDash([]);
  }
}

// ── canvas mouse events ──
function canvasXY(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: Math.round((e.clientX - rect.left) * scaleX),
    y: Math.round((e.clientY - rect.top) * scaleY),
  };
}

canvas.addEventListener('mousedown', e => {
  if (!currentImg) return;
  drawing = true;
  dragStart = canvasXY(e);
  dragCurrent = { ...dragStart };
});

canvas.addEventListener('mousemove', e => {
  if (!drawing) return;
  dragCurrent = canvasXY(e);
  redraw();
});

canvas.addEventListener('mouseup', e => {
  if (!drawing) return;
  drawing = false;
  const end = canvasXY(e);
  const x1 = Math.min(dragStart.x, end.x);
  const y1 = Math.min(dragStart.y, end.y);
  const x2 = Math.max(dragStart.x, end.x);
  const y2 = Math.max(dragStart.y, end.y);
  if (x2 - x1 > 4 && y2 - y1 > 4) {
    boxes.push({ cls_id: selectedCls, x1, y1, x2, y2 });
    renderBoxList();
  }
  dragStart = dragCurrent = null;
  redraw();
});

canvas.addEventListener('mouseleave', () => {
  if (drawing) {
    drawing = false;
    dragStart = dragCurrent = null;
    redraw();
  }
});

// ── box list ──
function renderBoxList() {
  const list = document.getElementById('boxList');
  document.getElementById('boxCount').textContent = boxes.length;
  list.innerHTML = '';
  boxes.forEach((b, i) => {
    const color = CLS_COLORS[b.cls_id] || '#888';
    const row = document.createElement('div');
    row.className = 'box-row';
    row.innerHTML = `
      <span class="cls-dot" style="background:${color};width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0;"></span>
      <span style="flex:1;font-size:0.73rem;">${CLS_NAMES[b.cls_id] || '?'} #${i+1}</span>
      <button class="box-del" title="Xoá">✕</button>
    `;
    row.querySelector('.box-del').addEventListener('click', () => {
      boxes.splice(i, 1);
      renderBoxList();
      redraw();
    });
    list.appendChild(row);
  });
}

// ── class buttons ──
document.querySelectorAll('.cls-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    selectedCls = parseInt(btn.dataset.cls);
    document.querySelectorAll('.cls-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ── nav prev/next ──
document.getElementById('btnPrev').addEventListener('click', () => loadImage(currentIdx - 1));
document.getElementById('btnNext').addEventListener('click', () => loadImage(currentIdx + 1));

// ── save ──
document.getElementById('btnSave').addEventListener('click', async () => {
  if (currentIdx < 0) return;
  const fname = images[currentIdx];
  const w = canvas.width;
  const h = canvas.height;
  const normalized = boxes.map(b => ({
    cls_id: b.cls_id,
    x_center: ((b.x1 + b.x2) / 2) / w,
    y_center: ((b.y1 + b.y2) / 2) / h,
    width:  (b.x2 - b.x1) / w,
    height: (b.y2 - b.y1) / h,
  }));

  const msg = document.getElementById('saveMsg');
  msg.textContent = 'Đang lưu...';
  try {
    const d = await apiFetch('/api/counting/dataset-label', {
      method: 'POST',
      body: JSON.stringify({ filename: fname, boxes: normalized }),
    });
    if (d.ok) {
      msg.textContent = `Đã lưu ${d.boxes} hộp`;
      labeledSet.add(fname);
      renderImageList();
    } else {
      msg.textContent = 'Lỗi: ' + JSON.stringify(d);
    }
  } catch (e) {
    msg.textContent = 'Lỗi: ' + e.message;
  }
});

// ── load cameras for collect dropdown ──
async function loadCameras() {
  try {
    const cams = await apiFetch('/api/counting/cameras');
    const sel = document.getElementById('collectCam');
    sel.innerHTML = '<option value="">— Chọn camera —</option>';
    (cams || []).forEach(cam => {
      const opt = document.createElement('option');
      opt.value = cam.id || cam.ID;
      opt.dataset.workerId = cam.workerId || '';
      const remoteTag = cam.workerId ? ' [remote]' : '';
      opt.textContent = (cam.name || cam.id) + remoteTag;
      sel.appendChild(opt);
    });
  } catch (e) {
    document.getElementById('collectMsg').textContent = 'Không tải được danh sách camera: ' + e.message;
  }
}

// ── populate train server selector ──
async function loadTrainServers() {
  try {
    const workers = await apiFetch('/api/workers/status');
    const sel = document.getElementById('trainServer');
    while (sel.options.length > 1) sel.remove(1);
    (workers || []).filter(w => w.online).forEach(w => {
      const opt = document.createElement('option');
      opt.value = w.id;
      opt.textContent = `🌐 ${w.name || w.id}`;
      sel.appendChild(opt);
    });
  } catch (e) {}
  // Load models for the currently selected server (local by default)
  await loadTrainModels(document.getElementById('trainServer').value);
}

// Base YOLO models always available (no server needed to download them).
const BASE_MODELS = [
  { value: 'yolo11n.pt', label: 'yolo11n.pt  –  Nano (fastest)' },
  { value: 'yolo11s.pt', label: 'yolo11s.pt  –  Small' },
  { value: 'yolo11m.pt', label: 'yolo11m.pt  –  Medium' },
  { value: 'yolo26n.pt', label: 'yolo26n.pt  –  Nano v2.6' },
];

async function loadTrainModels(workerID) {
  const sel  = document.getElementById('trainModel');
  const hint = document.getElementById('trainModelHint');
  const prev = sel.value; // remember current selection

  // Rebuild with base models first
  sel.innerHTML = '';
  const grpBase = document.createElement('optgroup');
  grpBase.label = '── Model YOLO gốc ──';
  BASE_MODELS.forEach(m => {
    const o = document.createElement('option');
    o.value = m.value; o.textContent = m.label;
    grpBase.appendChild(o);
  });
  sel.appendChild(grpBase);

  // Try fetching custom trained models from the selected server
  try {
    const url = workerID
      ? `/api/counting/models?worker=${encodeURIComponent(workerID)}`
      : '/api/counting/models';
    const data = await apiFetch(url);
    const custom = (data.custom || []).filter(f => f.endsWith('.pt'));
    if (custom.length > 0) {
      const grpCustom = document.createElement('optgroup');
      grpCustom.label = '── Model đã huấn luyện ──';
      custom.forEach(f => {
        const o = document.createElement('option');
        o.value = f;
        // Strip leading "models/" prefix for display; keep filename
        const name = f.replace(/^models\//, '');
        o.textContent = `📦 ${name}`;
        grpCustom.appendChild(o);
      });
      sel.appendChild(grpCustom);
      hint.textContent = `${custom.length} model đã huấn luyện (chọn để tiếp tục train từ đây)`;
      hint.style.display = '';
    } else {
      hint.style.display = 'none';
    }
  } catch (e) {
    hint.style.display = 'none';
  }

  // Restore previous selection if it still exists
  if (prev && [...sel.options].some(o => o.value === prev)) {
    sel.value = prev;
  }
}

// Reload model list whenever the train server changes
document.getElementById('trainServer')?.addEventListener('change', e => {
  loadTrainModels(e.target.value);
});

// ── collect frames ──
document.getElementById('btnCollect').addEventListener('click', async () => {
  const sel = document.getElementById('collectCam');
  const camId = sel.value;
  const frames = document.getElementById('collectFrames').value || '50';
  if (!camId) { document.getElementById('collectMsg').textContent = 'Chọn camera trước'; return; }
  const msg = document.getElementById('collectMsg');
  msg.textContent = `Đang thu thập (~${frames * 5}s)...`;
  try {
    const d = await apiFetch(`/api/counting/collect?camera=${encodeURIComponent(camId)}&frames=${frames}`, { method: 'POST' });
    if (d.error) { msg.textContent = 'Lỗi: ' + d.error; return; }
    msg.textContent = `✓ Thu thập ${d.collected ?? 0} ảnh vào dataset/images/`;
    await loadImages();
  } catch (e) {
    msg.textContent = 'Lỗi: ' + e.message;
  }
});

// ── generate dataset.yaml then train ──
document.getElementById('btnTrain').addEventListener('click', async () => {
  const model = document.getElementById('trainModel').value;
  const epochs = parseInt(document.getElementById('trainEpochs').value) || 50;
  const trainServer = document.getElementById('trainServer').value;
  const msg = document.getElementById('trainMsg');
  _trainWorker = trainServer;

  if (trainServer) {
    // Remote training: push dataset → generate yaml → start train on remote worker
    const wParam = '?worker=' + encodeURIComponent(trainServer);
    msg.textContent = 'Đang đẩy dataset lên máy chủ từ xa...';
    try {
      const push = await apiFetch('/api/counting/dataset-push' + wParam, { method: 'POST' });
      if (push.error) { msg.textContent = 'Lỗi push dataset: ' + push.error; return; }
      msg.textContent = `✓ Dataset đã đẩy. Đang tạo dataset.yaml...`;
      const yaml = await apiFetch('/api/counting/dataset-yaml' + wParam, { method: 'POST' });
      if (yaml.error) { msg.textContent = 'Lỗi tạo yaml: ' + yaml.error; return; }
      msg.textContent = `✓ dataset.yaml (${yaml.labeled} ảnh). Đang khởi động train từ xa...`;
      const d = await apiFetch('/api/counting/train' + wParam, {
        method: 'POST',
        body: JSON.stringify({ model, epochs }),
      });
      if (d.error) { msg.textContent = 'Lỗi: ' + d.error; return; }
      msg.textContent = d.message || '✓ Training bắt đầu trên máy chủ từ xa';
      startTrainPolling();
    } catch (e) {
      msg.textContent = 'Lỗi: ' + e.message;
    }
  } else {
    // Local training: generate yaml → start train
    msg.textContent = 'Đang tạo dataset.yaml...';
    try {
      const yaml = await apiFetch('/api/counting/dataset-yaml', { method: 'POST' });
      if (yaml.error) { msg.textContent = 'Lỗi tạo yaml: ' + yaml.error; return; }
      msg.textContent = `✓ dataset.yaml (${yaml.labeled} ảnh đã gán nhãn). Đang khởi động train...`;
      const d = await apiFetch('/api/counting/train', {
        method: 'POST',
        body: JSON.stringify({ model, epochs }),
      });
      if (d.error) { msg.textContent = 'Lỗi: ' + d.error; return; }
      msg.textContent = d.message || '✓ Training bắt đầu';
      startTrainPolling();
    } catch (e) {
      msg.textContent = 'Lỗi: ' + e.message;
    }
  }
});

// ── training status polling ──
let trainPollTimer = null;
function startTrainPolling() {
  if (trainPollTimer) return;
  trainPollTimer = setInterval(pollTrainStatus, 3000);
  pollTrainStatus();
}

async function pollTrainStatus() {
  const msg = document.getElementById('trainMsg');
  const logEl = document.getElementById('trainLog');
  try {
    const wParam = _trainWorker ? '?worker=' + encodeURIComponent(_trainWorker) : '';
    const st = await apiFetch('/api/counting/train-status' + wParam);
    logEl.style.display = 'block';
    logEl.textContent = (st.log || []).join('\n');
    logEl.scrollTop = logEl.scrollHeight;
    if (st.running) {
      msg.textContent = `⏳ Đang huấn luyện (PID ${st.pid})...`;
    } else if (st.pid) {
      clearInterval(trainPollTimer);
      trainPollTimer = null;
      if (st.returncode === 0) {
        if (_trainWorker && st.model) {
          msg.textContent = `✓ Huấn luyện hoàn tất. Đang kéo model về máy chủ chính...`;
          try {
            const pull = await apiFetch(
              `/api/workers/models/pull?id=${encodeURIComponent(_trainWorker)}&model=${encodeURIComponent(st.model)}`,
              { method: 'POST' }
            );
            msg.textContent = pull.ok
              ? `✓ Model đã kéo về: ${pull.path || st.model}`
              : `✓ Huấn luyện xong nhưng kéo model thất bại: ${pull.error || ''}`;
          } catch (pullErr) {
            msg.textContent = `✓ Huấn luyện xong. Lỗi kéo model: ${pullErr.message}`;
          }
        } else {
          msg.textContent = st.model
            ? `✓ Huấn luyện hoàn tất. Model lưu tại: ${st.model}`
            : '✓ Huấn luyện hoàn tất.';
        }
      } else {
        msg.textContent = `✗ Huấn luyện dừng (mã lỗi ${st.returncode}). Xem log bên dưới.`;
      }
    }
  } catch (e) {
    // service may be unreachable momentarily; keep polling
  }
}

function setStatus(msg) {
  document.getElementById('statusMsg').textContent = msg;
}

// Resume polling if training was already running when the page loads/reloads
(async () => {
  try {
    const st = await apiFetch('/api/counting/train-status');
    if (st.running) {
      document.getElementById('trainMsg').textContent = `⏳ Đang huấn luyện (PID ${st.pid})...`;
      startTrainPolling();
    }
  } catch (e) {}
})();
</script>
