<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Giao Thông – UTMC</title>
<link rel="stylesheet" href="app.css">
<link rel="stylesheet" href="https://unpkg.com/@vietmap/vietmap-gl-js@6.0.1/dist/vietmap-gl.css">
<style>
/* ── Status bar ── */
.db-status-bar {
  display:flex; align-items:center; gap:.75rem; flex-wrap:wrap;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:.65rem 1.1rem; margin-bottom:.7rem; font-size:.82rem;
}
.db-pill { display:inline-flex; align-items:center; gap:.35rem; padding:.2rem .65rem; border-radius:20px; font-size:.71rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
.db-pill.running { background:#16a34a22; color:#4ade80; }
.db-pill.idle    { background:#4b556322; color:#9ca3af; }
.db-pill-dot { width:7px; height:7px; border-radius:50%; background:currentColor; }
.db-pill.running .db-pill-dot { animation:db-pulse 2s ease-in-out infinite; }
@keyframes db-pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
.db-spacer { flex:1; }

/* ── KPI strip (compact row) ── */
.db-kpi-strip { display:flex; gap:.65rem; margin-bottom:.7rem; }
.db-kpi-mini {
  flex:1; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:.6rem .9rem;
  display:flex; flex-direction:column; gap:.1rem; min-width:0;
}
.db-kpi-mini .lbl { font-size:.66rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.db-kpi-mini .val { font-size:1.55rem; font-weight:800; line-height:1.05; letter-spacing:-.025em; color:var(--text); }
.db-kpi-mini .sub { font-size:.68rem; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.db-kpi-mini.green .val { color:#4ade80; }
.db-kpi-mini.blue  .val { color:#60a5fa; }
.db-kpi-mini.amber .val { color:#fbbf24; }
.db-kpi-mini.red   .val { color:#f87171; }
.db-kpi-mini.orange .val { color:#f97316; }

/* ── Section card ── */
.db-section {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:.9rem 1.1rem; margin-bottom:.75rem;
}
.db-section h3 {
  font-size:.73rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
  color:var(--text-muted); margin:0 0 .7rem;
  display:flex; align-items:center; gap:.5rem;
}

/* ── TTI Combined Chart ── */
.tti-chart-wrap { }
.tti-chart-row { display:flex; align-items:flex-start; gap:.6rem; margin-bottom:.25rem; }
.tti-row-label {
  width:128px; flex-shrink:0; padding-top:2px;
  display:flex; flex-direction:column; gap:.18rem;
}
.tti-rname {
  font-size:.72rem; font-weight:600; color:var(--text);
  line-height:1.3; word-break:break-word;
}
.tti-row-bars { flex:1; min-width:0; }
.tti-bar {
  display:flex; width:100%; overflow:hidden;
  border-radius:3px; position:relative;
}
.tti-bar-today { height:20px; }
.tti-bar-hist  { height:11px; margin-top:2px; opacity:.82; }
.tti-slot { flex:1; height:100%; }
.tti-slot[data-tip] { cursor:pointer; }
.tti-slot[data-tip]:hover { filter:brightness(1.3); }

/* ── Axis ── */
.tti-axis-wrap {
  position:relative; height:17px;
  margin-left:calc(128px + .6rem); margin-top:.25rem;
}
.tti-axis-lbl {
  position:absolute; font-size:.62rem;
  color:var(--text-muted); transform:translateX(-50%); white-space:nowrap;
}

/* ── Legend ── */
.tti-legend {
  display:flex; gap:.65rem; margin-top:.65rem; font-size:.7rem;
  color:var(--text-muted); flex-wrap:wrap; align-items:center;
}
.tti-legend span { display:flex; align-items:center; gap:.28rem; }
.tti-legend-dot { width:11px; height:11px; border-radius:2px; display:inline-block; flex-shrink:0; }

/* ── Bottom layout ── */
.db-bottom { display:grid; grid-template-columns:1fr 310px; gap:.75rem; }

/* ── Top routes table ── */
.db-table { width:100%; border-collapse:collapse; font-size:.8rem; }
.db-table th { text-align:left; padding:.35rem .45rem; color:var(--text-muted); font-size:.67rem; text-transform:uppercase; letter-spacing:.05em; border-bottom:1px solid var(--border); white-space:nowrap; }
.db-table td { padding:.38rem .45rem; border-bottom:1px solid var(--border); vertical-align:middle; }
.db-table tr:last-child td { border-bottom:none; }
.db-table .num { text-align:right; font-variant-numeric:tabular-nums; }
.db-tti-badge { display:inline-block; padding:.08rem .38rem; border-radius:4px; font-weight:700; font-size:.75rem; min-width:38px; text-align:center; }
/* Route status breakdown (count by congestion tier) */
.db-route-status { display:flex; flex-wrap:wrap; gap:.4rem .55rem; align-items:center; margin:.1rem 0 .6rem; }
.db-rs-chip { display:inline-flex; align-items:center; gap:.32rem; font-size:.76rem; font-weight:600; background:var(--surface2); border:1px solid var(--border); border-radius:999px; padding:.16rem .6rem; }
.db-rs-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.db-trend { font-size:.82rem; font-weight:700; line-height:1; display:inline-block; width:1em; text-align:center; }

/* ── Map ── */
#dashMap { width:100%; height:440px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); }

/* ── Tooltip ── */
#dbTooltip {
  position:fixed; display:none; z-index:9999;
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:.48rem .7rem;
  font-size:.74rem; line-height:1.6; pointer-events:none;
  box-shadow:0 4px 20px rgba(0,0,0,.55); max-width:210px;
  white-space:pre-line; color:var(--text);
}

/* ── Misc ── */
#dbRefreshTs { font-size:.74rem; color:var(--text-muted); }
.db-empty { color:var(--text-muted); text-align:center; padding:1.5rem; font-size:.83rem; }
.hist-ctrl { display:flex; gap:.45rem; align-items:center; flex-wrap:wrap; margin-left:auto; }
.hist-ctrl label { font-size:.74rem; color:var(--text-muted); font-weight:400; text-transform:none; letter-spacing:0; }
.hist-ctrl input[type=date] { font-size:.75rem; background:var(--surface2); border:1.5px solid var(--border); color:var(--text); border-radius:8px; padding:.35rem .6rem; cursor:pointer; outline:none; transition:border-color .18s,box-shadow .18s; }
.hist-ctrl input[type=date]:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,130,246,.14); }
.hist-ctrl input[type=date]::-webkit-calendar-picker-indicator { filter:invert(1); cursor:pointer; opacity:.7; }
.hist-ctrl input[type=date]::-webkit-calendar-picker-indicator:hover { opacity:1; }

@media (max-width:960px) {
  .db-kpi-strip { flex-wrap:wrap; }
  .db-kpi-mini  { min-width:calc(50% - .35rem); flex:none; }
  .db-bottom { grid-template-columns:1fr; }
  #dashMap { height:300px; }
  .tti-row-label { width:90px; }
  .tti-axis-wrap { margin-left:calc(90px + .6rem); }
}
@media (max-width:768px) {
  .db-bottom { grid-template-columns:1fr !important; }
  .tti-row-label { width:70px !important; }
  .tti-axis-wrap { margin-left:calc(70px + .4rem) !important; }
  #dashMap { height:240px !important; }
  .hist-ctrl { flex-direction:column; gap:.4rem; }
  .db-kpi-mini .lbl { font-size:.75rem !important; }
  .db-kpi-mini .sub { font-size:.73rem !important; }
  .tti-axis-lbl { font-size:.7rem !important; }
  .db-kpi-mini { min-width:calc(50% - .35rem) !important; }
  .topbar-actions .btn { padding:6px 10px !important; }
}
@media (min-width:1280px) {
  .db-kpi-mini .val { font-size:1.8rem; }
  .db-kpi-mini .lbl { font-size:.72rem; }
  .tti-bar-today { height:26px; }
  .tti-bar-hist  { height:14px; }
  .db-bottom { grid-template-columns:1fr 380px; }
  .tti-axis-lbl { font-size:.68rem; }
  .tti-row-label { width:150px; }
  .tti-axis-wrap { margin-left:calc(150px + .6rem); }
}
@media (min-width:1600px) {
  .db-bottom { grid-template-columns:1fr 440px; }
  .db-kpi-mini .val { font-size:2.1rem; }
}
</style>
</head>

<script>
// ── Constants ─────────────────────────────────────────────────────────────
const SLOT_MIN    = 15;          // minutes per slot
const TOTAL_SLOTS = 96;          // 24h × 4 slots/h

// ── State ─────────────────────────────────────────────────────────────────
let _data       = null;
let _histLogs   = [];
let _histDate   = '';
let _lastWeekLogs = []; // same weekday last week — baseline for week-over-week trend
let _lastWeekDate = '';
let _map        = null;
let _mapInited  = false;
let _skelBuilt  = false;
let _refreshTimer = null;
let _ttiAppearance = null; // loaded from /api/traveltime/appearance

// ── Helpers ───────────────────────────────────────────────────────────────
function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('vi-VN',{hour12:false,hour:'2-digit',minute:'2-digit'});
}
// ── TTI colour helpers (driven by _ttiAppearance loaded from server) ─────────
const _ttiDefault = {
  tiers: [
    {maxTTI:1.2,  color:'#22c55e', label:'Thông thoáng'},
    {maxTTI:1.35, color:'#84cc16', label:'Bình thường'},
    {maxTTI:1.5,  color:'#f59e0b', label:'Chậm'},
    {maxTTI:0,    color:'#ef4444', label:'Tắc nghẽn'},
  ],
  noDataColor: '#334155',
};
function _getTiers() { return (_ttiAppearance||_ttiDefault).tiers||[]; }
function ttiTier(v) {
  if (!v || v <= 0) return null;
  const tiers = _getTiers();
  for (let i = 0; i < tiers.length - 1; i++) {
    if (v < tiers[i].maxTTI) return tiers[i];
  }
  return tiers[tiers.length - 1] || null;
}
function ttiColor(v) { const t = ttiTier(v); return t ? t.color : ''; }
function ttiLabel(v) { const t = ttiTier(v); return t ? t.label : 'Không có dữ liệu'; }
function ttiBg(v)  { const t = ttiTier(v); return t ? t.color+'22' : '#1e293b'; }
function ttiFg(v)  { const t = ttiTier(v); return t ? t.color : '#9ca3af'; }

async function loadTtiAppearance() {
  try {
    const r = await apiFetch('/api/traveltime/appearance');
    if (r && r.tiers) _ttiAppearance = r;
  } catch(_) {}
  if (!_ttiAppearance || !(_ttiAppearance.tiers||[]).length) _ttiAppearance = JSON.parse(JSON.stringify(_ttiDefault));
}

function renderTtiLegend() {
  const el = document.getElementById('ttiLegend');
  if (!el) return;
  const tiers = _getTiers();
  const nd = (_ttiAppearance||_ttiDefault).noDataColor || '#334155';
  let html = '';
  for (let i = 0; i < tiers.length; i++) {
    const t = tiers[i];
    const prevMax = i > 0 ? tiers[i-1].maxTTI : null;
    const curMax  = t.maxTTI;
    let range = '';
    if (curMax === 0 || i === tiers.length - 1) {
      range = prevMax != null ? `≥${prevMax} ` : '';
    } else if (prevMax == null) {
      range = `< ${curMax} `;
    } else {
      range = `${prevMax}–${curMax} `;
    }
    html += `<span><span class="tti-legend-dot" style="background:${t.color}"></span>${escH(range)}${escH(t.label)}</span>`;
  }
  html += `<span><span class="tti-legend-dot" style="background:${nd};border:1px solid var(--border)"></span>Không có dữ liệu</span>`;
  el.innerHTML = html;
}

// ── TTI appearance admin panel ────────────────────────────────────────────────
let _ttiCfgOpen = false;
function toggleTtiCfg() {
  const p = document.getElementById('ttiCfgPanel');
  if (!p) return;
  _ttiCfgOpen = !_ttiCfgOpen;
  p.style.display = _ttiCfgOpen ? '' : 'none';
  if (_ttiCfgOpen) renderTtiCfgPanel();
}
function renderTtiCfgPanel() {
  const panel = document.getElementById('ttiCfgPanel');
  if (!panel || !_ttiAppearance) return;
  const tiers = _ttiAppearance.tiers;
  const nd = _ttiAppearance.noDataColor || '#334155';
  const rowHtml = tiers.map((t, i) => {
    const isLast = i === tiers.length - 1;
    const maxInput = isLast
      ? `<span style="width:78px;font-size:.72rem;color:var(--text-muted)">≥ giá trị trước</span>`
      : `<span style="font-size:.72rem;color:var(--text-muted)">< </span><input type="number" value="${t.maxTTI}" step="0.05" min="1.01" max="9.9" oninput="_ttiAppearance.tiers[${i}].maxTTI=+this.value;renderTtiLegend()" style="width:52px;font-size:.76rem;border:1px solid var(--border);border-radius:4px;padding:.2rem .35rem;background:var(--surface);color:var(--text)">`;
    const delBtn = tiers.length > 1

// Slot helpers
function slotOfTs(ts) {
  const d = new Date(ts);
  return Math.floor((d.getHours() * 60 + d.getMinutes()) / SLOT_MIN);
}
function slotLabel(idx) {
  const s = idx * SLOT_MIN, e = s + SLOT_MIN;
  const p = n => String(Math.floor(n/60)).padStart(2,'0') + ':' + String(n%60).padStart(2,'0');
  return p(s) + '–' + p(e);
}

// Build 96-slot array from log entries for one route
function buildSlots(logs, routeId) {
  const acc = Array.from({length: TOTAL_SLOTS}, () => null);
  const buf = Array.from({length: TOTAL_SLOTS}, () => ({n:0, tti:0, delay:0, len:0}));
  (logs||[]).filter(e => e.routeId === routeId && e.timestamp && e.tti > 0).forEach(e => {
    const i = slotOfTs(e.timestamp);
    if (i < 0 || i >= TOTAL_SLOTS) return;
    buf[i].n++;
    buf[i].tti   += e.tti;
    buf[i].delay += e.delaySec || 0;
    buf[i].len   += e.lengthM  || 0;
  });
  for (let i = 0; i < TOTAL_SLOTS; i++) {
    if (buf[i].n > 0) {
      acc[i] = {
        tti:   buf[i].tti   / buf[i].n,
        delay: Math.round(buf[i].delay / buf[i].n),
        len:   Math.round(buf[i].len   / buf[i].n),
        n:     buf[i].n,
      };
    }
  }
  return acc;
}

// Week-over-week trend: compare a route's current TTI (latest measured slot
// today) against the SAME time slot on the SAME weekday last week. This flags
// whether traffic right now is worse/better than the typical level for this
// time — the foundation for baseline traffic forecasting.
const TREND_EPS = 0.05; // TTI change below this is "≈ như tuần trước"
function avgSlotAround(slots, idx) {
  // robust baseline: average non-null TTI in [idx-1 .. idx+1]
  let sum = 0, n = 0;
  for (let j = idx - 1; j <= idx + 1; j++) {
    if (j >= 0 && j < slots.length && slots[j]) { sum += slots[j].tti; n++; }
  }
  return n ? sum / n : null;
}
function routeTrend(todaySlots, lastWeekSlots) {
  let curIdx = -1;
  for (let i = todaySlots.length - 1; i >= 0; i--) { if (todaySlots[i]) { curIdx = i; break; } }
  if (curIdx < 0) return null;
  const cur = todaySlots[curIdx].tti;
  if (!lastWeekSlots) return { dir: 'nodata', cur };
  const base = avgSlotAround(lastWeekSlots, curIdx);
  if (base == null) return { dir: 'nodata', cur };
  const delta = cur - base;
  const dir = delta > TREND_EPS ? 'up' : (delta < -TREND_EPS ? 'down' : 'flat');
  return { dir, delta, cur, base };
}
// Higher TTI = worse traffic, so ▲ (worse than last week) is red, ▼ (better) is green.
function trendArrow(tr) {
  if (!tr) return '';
  const wk = _lastWeekDate ? ` cùng giờ ${_lastWeekDate}` : ' tuần trước';
  if (tr.dir === 'up')   return `<span class="db-trend" style="color:#ef4444" title="Tệ hơn${wk} (+${tr.delta.toFixed(2)} TTI)">▲</span>`;
  if (tr.dir === 'down') return `<span class="db-trend" style="color:#22c55e" title="Tốt hơn${wk} (${tr.delta.toFixed(2)} TTI)">▼</span>`;
  if (tr.dir === 'flat') return `<span class="db-trend" style="color:var(--text-muted)" title="Tương đương${wk}">▬</span>`;
  return `<span class="db-trend" style="color:var(--border)" title="Chưa có dữ liệu${wk} để so sánh">·</span>`;
}

// Network status breakdown: how many routes sit in each congestion tier now.
function updateRouteStatus(tt) {
  const el = document.getElementById('dbRouteStatus');
  if (!el) return;
  const all     = tt.routes || [];
  const measured = all.filter(r => r.latestTTI > 0);
  const tiers   = _getTiers();
  const counts  = tiers.map(() => 0);
  measured.forEach(r => {
    const idx = tiers.indexOf(ttiTier(r.latestTTI));
    if (idx >= 0) counts[idx]++;
  });
  const noData = all.length - measured.length;
  const chips = tiers.map((t, i) => counts[i] > 0
    ? `<span class="db-rs-chip"><span class="db-rs-dot" style="background:${t.color}"></span>${counts[i]} ${escH(t.label || '')}</span>`
    : '').filter(Boolean);
  if (noData > 0) {
    const nd = (_ttiAppearance || _ttiDefault).noDataColor || '#334155';
    chips.push(`<span class="db-rs-chip"><span class="db-rs-dot" style="background:${nd}"></span>${noData} chưa có dữ liệu</span>`);
  }
  el.innerHTML = chips.length
    ? `<span style="font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;font-weight:700">Trạng thái mạng lưới:</span>` + chips.join('')
    : '<span style="font-size:.76rem;color:var(--text-muted)">Chưa có dữ liệu tuyến</span>';
}

// ── Tooltip ───────────────────────────────────────────────────────────────
let _tipEl = null;
function initTooltip() {
  if (_tipEl) return;
  _tipEl = document.createElement('div');
  _tipEl.id = 'dbTooltip';
  document.body.appendChild(_tipEl);
  const cont = document.getElementById('dbContent');
  cont.addEventListener('mouseover', e => {
    const el = e.target.closest('[data-tip]');
    if (el?.dataset.tip) { _tipEl.textContent = el.dataset.tip; _tipEl.style.display = 'block'; posTip(e); }
  });
  cont.addEventListener('mouseout', e => {
    const from = e.target.closest('[data-tip]');
    const to   = e.relatedTarget?.closest?.('[data-tip]');
    if (from && from !== to) _tipEl.style.display = 'none';
  });
  document.addEventListener('mousemove', e => { if (_tipEl?.style.display !== 'none') posTip(e); });
}
function posTip(e) {
  if (!_tipEl) return;
  const w = _tipEl.offsetWidth||190, h = _tipEl.offsetHeight||70;
  let x = e.clientX+14, y = e.clientY-8;
  if (x+w > window.innerWidth-6)  x = e.clientX-w-10;
  if (y+h > window.innerHeight-6) y = e.clientY-h-6;
  _tipEl.style.left = x+'px'; _tipEl.style.top = y+'px';
}

async function loadDashboard() {
  try {

    loadLastWeek(); // fetch week-ago baseline in background, then refresh trends
  } catch (e) {
    document.getElementById('dbContent').innerHTML =
      `<div class="db-empty" style="margin-top:3rem">⚠️ Không tải được dữ liệu: ${escH(e.message)}</div>`;
  }
}

// Load the same weekday last week as a baseline for week-over-week trend.
async function loadLastWeek() {
  const d = new Date(); d.setDate(d.getDate() - 7);
  const date = d.toISOString().slice(0, 10);
  if (_lastWeekDate === date && _lastWeekLogs.length) return;
  try {
    _lastWeekLogs = await apiFetch('/api/dashboard/history?date=' + date) || [];
    _lastWeekDate = date;
  } catch (_) { _lastWeekLogs = []; }
  // Re-render the trend-dependent views now that the baseline is available.
  if (_data) {
    const tt = _data.travelTime || {};
    renderTTIChart(tt.routes || [], tt.todayLogs || [], _histLogs);
    updateTopRoutes(tt);
  }
}

async function loadHistory() {
  const dateEl = document.getElementById('histDate');
  if (!dateEl?.value) return;
  const date = dateEl.value;
  const statEl = document.getElementById('histStatus');
  if (statEl) statEl.textContent = 'Đang tải…';
  try {
    const logs = await apiFetch('/api/dashboard/history?date=' + date);
    _histLogs = logs || [];
    _histDate = date;
    // Re-render only TTI chart
    const tt = (_data||{}).travelTime || {};
    renderTTIChart(tt.routes||[], tt.todayLogs||[], _histLogs);
    if (statEl) statEl.textContent = _histLogs.length
      ? `${_histDate}: ${_histLogs.length} bản ghi`
      : `${_histDate}: không có dữ liệu`;
  } catch (e) {
    if (statEl) statEl.textContent = 'Lỗi: ' + e.message;
  }
}

  const today = tt.date || new Date().toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'});
  sb.innerHTML = `
    <span class="db-pill ${tf.running?'running':'idle'}">
      <span class="db-pill-dot"></span>${tf.running?'Traffic Monitor':'Monitor Offline'}

    <span style="color:var(--text-muted)">Quét: <b style="color:var(--text)">${escH(scanned)}</b></span>

  `;
}

// ── TTI Combined Chart (full-width) ───────────────────────────────────────
function renderTTIChart(routes, todayLogs, histLogs) {
  const body  = document.getElementById('ttiChartBody');
  const axis  = document.getElementById('ttiAxis');
  if (!body || !axis) return;

  if (!routes.length) {
    body.innerHTML = '<div class="db-empty">Chưa có tuyến đường nào</div>';
    axis.innerHTML = '';
    return;
  }

  const now        = new Date();
  const currentSlot = slotOfTs(now.toISOString());
  const nowMinPct  = ((now.getHours()*60 + now.getMinutes()) / (24*60) * 100).toFixed(2);

  const isAdmin = (getUser()||{}).role === 'admin';

  body.innerHTML = routes.map(r => {
    const todaySlots = buildSlots(todayLogs, r.id);
    const trend      = routeTrend(todaySlots, _lastWeekLogs.length ? buildSlots(_lastWeekLogs, r.id) : null);
    const histSlots  = histLogs.length ? buildSlots(histLogs, r.id) : null;
    const hasHistData = histSlots && histSlots.some(s => s !== null);

    const todayBar   = renderSlotBar(todaySlots, currentSlot, false);
    const histBar    = histSlots ? renderSlotBar(histSlots, -1, true) : '';
    const histLabel  = histSlots
      ? `<span style="font-size:.64rem;color:var(--text-muted)">${escH(_histDate)}${!hasHistData ? ' (không có dữ liệu)' : ''}</span>`
      : '';

    const dragAttr   = isAdmin ? `draggable="true" data-id="${escH(r.id)}"` : '';
    const dragHandle = isAdmin
      ? `<span style="cursor:grab;color:var(--text-muted);flex-shrink:0;margin-right:.15rem" title="Kéo để đổi thứ tự">⠿</span>`
      : '';

    return `<div class="tti-chart-row" ${dragAttr}>
      <div class="tti-row-label">
        <div style="display:flex;align-items:center;gap:.3rem">${dragHandle}${trendArrow(trend)}<span class="tti-rname" title="${escH(r.name)}">${escH(r.name)}</span></div>
      </div>
      <div class="tti-row-bars">
        <div class="tti-bar tti-bar-today">${todayBar}</div>
        ${histSlots ? `
        <div style="display:flex;align-items:center;gap:0">
          <div class="tti-bar tti-bar-hist" style="flex:1">${histBar}</div>
        </div>` : ''}
        ${histLabel}
      </div>
    </div>`;
  }).join('');

  if (isAdmin) initTTIDragSort();

  // Axis
  const marks = [0,6,12,18].map(h => {
    const pct = (h/24*100).toFixed(2);
    return `<span class="tti-axis-lbl" style="left:${pct}%">${String(h).padStart(2,'0')}:00</span>`;
  }).join('');
  const nowMark = `<span class="tti-axis-lbl" style="left:${nowMinPct}%;color:var(--accent);font-weight:600">${fmtTime(now.toISOString())} ▲</span>`;
  axis.innerHTML = marks + nowMark;
}

// Render one row of 96 slots
function renderSlotBar(slots, currentSlot, isHistory) {
  return slots.map((s, i) => {
    const isFuture = !isHistory && currentSlot >= 0 && i > currentSlot;

    let bg, tip = '';
    if (s) {
      bg = ttiColor(s.tti) || 'var(--surface2)';
      const prefix = isHistory ? (_histDate + ' ') : 'Hôm nay ';
      tip = `${prefix}${slotLabel(i)}\nTTI: ${s.tti.toFixed(2)} — ${ttiLabel(s.tti)}\nTrễ TB: ${Math.round(s.delay/60)} phút\n${s.n} lần đo`;
    } else if (isFuture) {
      bg = 'var(--surface2)';
      return `<div class="tti-slot" style="flex:1;background:${bg};opacity:.18"></div>`;
    } else {
      bg = 'var(--surface2)';
    }

    const tipAttr = tip ? ` data-tip="${escH(tip)}"` : '';
    return `<div class="tti-slot" style="flex:1;background:${bg}"${tipAttr}></div>`;
  }).join('');
}

// ── TTI drag-to-reorder ───────────────────────────────────────────────────
async function saveRouteOrder(ids) {
  try {
    await apiFetch('/api/traveltime/routes/order', {method:'PUT', body:JSON.stringify(ids)});
  } catch(e) { console.error('saveRouteOrder', e); }
}

function initTTIDragSort() {
  const wrap = document.getElementById('ttiChartBody');
  if (!wrap) return;
  let dragSrc = null;
  wrap.querySelectorAll('.tti-chart-row[data-id]').forEach(row => {
    row.addEventListener('dragstart', e => {
      dragSrc = row;
      e.dataTransfer.effectAllowed = 'move';
      row.style.opacity = '0.45';
    });
    row.addEventListener('dragend', () => { row.style.opacity = ''; dragSrc = null; });
    row.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
    row.addEventListener('dragenter', e => { e.preventDefault(); row.style.outline = '2px solid var(--accent)'; });
    row.addEventListener('dragleave', () => { row.style.outline = ''; });
    row.addEventListener('drop', async e => {
      e.preventDefault();
      row.style.outline = '';
      if (!dragSrc || dragSrc === row) return;
      const rows = [...wrap.querySelectorAll('.tti-chart-row[data-id]')];
      const srcIdx = rows.indexOf(dragSrc);
      const dstIdx = rows.indexOf(row);
      rows.splice(srcIdx, 1);
      rows.splice(dstIdx, 0, dragSrc);
      rows.forEach(r => wrap.appendChild(r));
      await saveRouteOrder(rows.map(r => r.dataset.id));
    });
  });
}

// ── Map ───────────────────────────────────────────────────────────────────
async function initMap() {
  try {
    const settings = await apiFetch('/api/settings');
    const apiKey   = (settings||{}).vietmap_api_key || '';
    const mapEl    = document.getElementById('dashMap');
    if (!mapEl) return;
    if (!apiKey) { mapEl.innerHTML = '<div class="db-empty">Chưa cấu hình VietMap API Key</div>'; return; }

    _map = new vietmapgl.Map({
      container: 'dashMap',
      style: `https://maps.vietmap.vn/maps/styles/lm/style.json?apikey=${apiKey}`,
      center: [106.700, 10.776],
      zoom: 11,
    });
    _map.addControl(new vietmapgl.NavigationControl({showCompass:false}), 'top-right');
    _map.on('load', () => {
      _mapInited = true;
      const tf = (_data||{}).traffic || {};
      addMapLayers(tf);
      applyHeatmapCfg();
    });
  } catch (e) {
    const el = document.getElementById('dashMap');
    if (el) el.innerHTML = `<div class="db-empty">Lỗi bản đồ: ${escH(e.message)}</div>`;
  }
}

function buildJamFeatures(tf) {
  return (tf.points||[]).map(p => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [p.lng, p.lat] },
    properties: { jf: p.jf, label: p.label||'', area: p.area||'' },
  }));
}

function addMapLayers(tf) {
  if (!_map || !_mapInited) return;
  const features = buildJamFeatures(tf);

  _map.addSource('jams', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features },
  });

  // Heatmap layer
  _map.addLayer({
    id: 'jams-heat', type: 'heatmap', source: 'jams',
    paint: {
      'heatmap-weight': ['interpolate',['linear'],['get','jf'], 0,0, 5,0.6, 10,1.5],
      'heatmap-intensity': ['interpolate',['linear'],['zoom'], 5,0.8, 12,1.8, 15,2.5],
      'heatmap-color': [
        'interpolate',['linear'],['heatmap-density'],
        0,   'rgba(0,0,0,0)',
        0.15,'rgba(251,191,36,0.35)',
        0.4, 'rgba(249,115,22,0.65)',
        0.7, 'rgba(239,68,68,0.85)',
        1,   'rgba(153,27,27,0.95)',
      ],
      'heatmap-radius': ['interpolate',['linear'],['zoom'], 5,8, 11,13, 15,22],
      'heatmap-opacity': 0.88,
    },
  });

  // Individual circles (shown at higher zoom)
  _map.addLayer({
    id: 'jams-dot', type: 'circle', source: 'jams',
    minzoom: 13,
    paint: {
      'circle-radius': ['interpolate',['linear'],['get','jf'], 0,2, 10,7],
      'circle-color':  ['case',['>=',['get','jf'],8],'#f87171',['>=',['get','jf'],5],'#fbbf24','#94a3b8'],
      'circle-opacity': .85,
      'circle-stroke-width': 1, 'circle-stroke-color': 'rgba(255,255,255,.45)',
    },
  });

  // Click popup on dots
  _map.on('click','jams-dot', e => {
    const p = e.features[0].properties;
    const jf = (+p.jf).toFixed(1);
    const jfColor = +p.jf >= 8 ? '#dc2626' : +p.jf >= 5 ? '#d97706' : '#475569';
    const html = `<div style="font-family:sans-serif;line-height:1.5;min-width:110px">` +
      `<div style="font-size:.95rem;font-weight:700;color:${jfColor}">JF ${jf}</div>` +
      (p.area  ? `<div style="color:#111;font-size:.82rem">${p.area}</div>` : '') +
      (p.label ? `<div style="color:#333;font-size:.75rem">${p.label}</div>` : '') +
      `</div>`;
    new vietmapgl.Popup({closeButton:false, maxWidth:'200px'})
      .setLngLat(e.lngLat).setHTML(html).addTo(_map);
  });
  _map.on('mouseenter','jams-dot',() => _map.getCanvas().style.cursor='pointer');
  _map.on('mouseleave','jams-dot',() => _map.getCanvas().style.cursor='');

  // Update point count display
  const countEl = document.getElementById('heatmapCount');
  if (countEl) countEl.textContent = features.length ? `(${features.length} điểm)` : '';

  // Fit to jam points if available
  if (features.length > 0) {
    try {
      const b = new vietmapgl.LngLatBounds();
      features.forEach(f => b.extend(f.geometry.coordinates));
      _map.fitBounds(b, {padding:50, maxZoom:14, duration:600});
    } catch (_) {}
  }
}

function updateMapData(tf) {
  if (!_map || !_mapInited) return;
  try {
    const src = _map.getSource('jams');
    if (src) src.setData({type:'FeatureCollection', features: buildJamFeatures(tf)});
  } catch (_) {}
  const countEl = document.getElementById('heatmapCount');
  if (countEl) {
    const n = (tf.points||[]).length;
    countEl.textContent = n ? `(${n} điểm)` : '';
  }
}

// ── Heatmap config ────────────────────────────────────────────────────────
const _HEAT_DEFAULTS = { r5:8, r15:22, i5:6, i15:18, op:82,
  c1:'#fbbf24', c1a:30, c2:'#f97316', c2a:60, c3:'#ef4444', c3a:82, c4:'#991b1b', c4a:95,
  crf:2, crt:7 }; // dot circle-radius: at JF=0 and JF=10

function toggleHeatmapCfg() {
  const p = document.getElementById('heatmapCfgPanel');
  if (p) p.style.display = p.style.display === 'none' ? '' : 'none';
}

function _hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function _readHeatCfg() {
  return {
    r5:  +document.getElementById('cfgR5').value,
    r15: +document.getElementById('cfgR15').value,
    i5:  +document.getElementById('cfgI5').value,
    i15: +document.getElementById('cfgI15').value,
    op:  +document.getElementById('cfgOp').value,
    c1:  document.getElementById('cfgC1').value,
    c1a: +document.getElementById('cfgC1a').value,
    c2:  document.getElementById('cfgC2').value,
    c2a: +document.getElementById('cfgC2a').value,
    c3:  document.getElementById('cfgC3').value,
    c3a: +document.getElementById('cfgC3a').value,
    c4:  document.getElementById('cfgC4').value,
    c4a: +document.getElementById('cfgC4a').value,
    crf: +document.getElementById('cfgCrf').value,
    crt: +document.getElementById('cfgCrt').value,
  };
}

function _applyHeatCfgToUI(v) {
  document.getElementById('cfgR5').value  = v.r5;   document.getElementById('cfgR5v').textContent  = v.r5;
  document.getElementById('cfgR15').value = v.r15;  document.getElementById('cfgR15v').textContent = v.r15;
  document.getElementById('cfgI5').value  = v.i5;   document.getElementById('cfgI5v').textContent  = (v.i5/10).toFixed(1);
  document.getElementById('cfgI15').value = v.i15;  document.getElementById('cfgI15v').textContent = (v.i15/10).toFixed(1);
  document.getElementById('cfgOp').value  = v.op;   document.getElementById('cfgOpv').textContent  = v.op + '%';
  document.getElementById('cfgC1').value  = v.c1;   document.getElementById('cfgC1a').value = v.c1a; document.getElementById('cfgC1av').textContent = v.c1a + '%';
  document.getElementById('cfgC2').value  = v.c2;   document.getElementById('cfgC2a').value = v.c2a; document.getElementById('cfgC2av').textContent = v.c2a + '%';
  document.getElementById('cfgC3').value  = v.c3;   document.getElementById('cfgC3a').value = v.c3a; document.getElementById('cfgC3av').textContent = v.c3a + '%';
  document.getElementById('cfgC4').value  = v.c4;   document.getElementById('cfgC4a').value = v.c4a; document.getElementById('cfgC4av').textContent = v.c4a + '%';
  const crf = v.crf ?? _HEAT_DEFAULTS.crf;
  const crt = v.crt ?? _HEAT_DEFAULTS.crt;
  document.getElementById('cfgCrf').value = crf; document.getElementById('cfgCrfv').textContent = crf + 'px';
  document.getElementById('cfgCrt').value = crt; document.getElementById('cfgCrtv').textContent = crt + 'px';
}

async function loadHeatmapCfg() {
  let v = _HEAT_DEFAULTS;
  try {
    const cfg = await apiFetch('/api/heatmap-cfg');
    if (cfg && typeof cfg === 'object') v = {..._HEAT_DEFAULTS, ...cfg};
  } catch(_) {}
  _applyHeatCfgToUI(v);
}

function applyHeatmapCfg() {
  const v = _readHeatCfg();
  document.getElementById('cfgR5v').textContent  = v.r5;
  document.getElementById('cfgR15v').textContent = v.r15;
  document.getElementById('cfgI5v').textContent  = (v.i5/10).toFixed(1);
  document.getElementById('cfgI15v').textContent = (v.i15/10).toFixed(1);
  document.getElementById('cfgOpv').textContent  = v.op + '%';
  document.getElementById('cfgC1av').textContent = v.c1a + '%';
  document.getElementById('cfgC2av').textContent = v.c2a + '%';
  document.getElementById('cfgC3av').textContent = v.c3a + '%';
  document.getElementById('cfgC4av').textContent = v.c4a + '%';
  document.getElementById('cfgCrfv').textContent = v.crf + 'px';
  document.getElementById('cfgCrtv').textContent = v.crt + 'px';

  if (!_map || !_mapInited) return;
  const r5 = v.r5, r15 = v.r15, i5 = v.i5/10, i15 = v.i15/10, op = v.op/100;
  const r11 = Math.round((r5*2+r15)/3), i12 = Math.round((i5+i15)/2*10)/10;
  const c = ['rgba(0,0,0,0)', _hexToRgba(v.c1,v.c1a/100), _hexToRgba(v.c2,v.c2a/100), _hexToRgba(v.c3,v.c3a/100), _hexToRgba(v.c4,v.c4a/100)];
  try {
    _map.setPaintProperty('jams-heat', 'heatmap-radius',
      ['interpolate',['linear'],['zoom'], 5,r5, 11,r11, 15,r15]);
    _map.setPaintProperty('jams-heat', 'heatmap-intensity',
      ['interpolate',['linear'],['zoom'], 5,i5, 12,i12, 15,i15]);
    _map.setPaintProperty('jams-heat', 'heatmap-opacity', op);
    _map.setPaintProperty('jams-heat', 'heatmap-color',
      ['interpolate',['linear'],['heatmap-density'], 0,c[0], 0.15,c[1], 0.4,c[2], 0.7,c[3], 1,c[4]]);
    _map.setPaintProperty('jams-dot', 'circle-radius',
      ['interpolate',['linear'],['get','jf'], 0,v.crf, 10,v.crt]);
  } catch(_) {}
}

async function saveHeatmapCfg() {
  const cfg = _readHeatCfg();
  try {
    await apiFetch('/api/heatmap-cfg', {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(cfg)});
  } catch(_) {}
  const msg = document.getElementById('heatCfgSaved');
  if (msg) { msg.style.display = ''; setTimeout(() => { msg.style.display = 'none'; }, 2000); }
}

async function resetHeatmapCfg() {
  try { await apiFetch('/api/heatmap-cfg', {method:'DELETE'}); } catch(_) {}
  _applyHeatCfgToUI(_HEAT_DEFAULTS);
  applyHeatmapCfg();
}
