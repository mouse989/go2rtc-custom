<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tổng quan điều hành – UTMC Platform</title>
<link href="https://unpkg.com/@vietmap/vietmap-gl-js@6.0.1/dist/vietmap-gl.css" rel="stylesheet">
<link rel="stylesheet" href="app.css">
<style>
  html, body { height: 100%; margin: 0; }
  body { background: #0a0e14; color: #e6edf3; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  .wb { display: flex; flex-direction: column; height: 100vh; }

  /* Header */
  .wb-head { display: flex; align-items: center; gap: 14px; padding: 10px 18px; background: #0d1320; border-bottom: 1px solid #1c2434; flex-shrink: 0; }
  .wb-title { font-size: 1.05rem; font-weight: 800; letter-spacing: .04em; display: flex; align-items: center; gap: 10px; }
  .wb-title img { height: 30px; }
  .wb-clock { margin-left: auto; font-variant-numeric: tabular-nums; font-size: 1.15rem; font-weight: 700; }
  .wb-upd { font-size: .72rem; color: #7d8aa0; }
  .wb-btn { background: #18202f; border: 1px solid #283248; color: #cdd6e4; border-radius: 7px; padding: 6px 11px; font-size: .8rem; cursor: pointer; }
  .wb-btn:hover { background: #222c40; }

  /* KPI strip */
  .wb-kpis { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: 10px; padding: 12px 18px; flex-shrink: 0; }
  .kpi { background: #0e1626; border: 1px solid #1c2638; border-radius: 12px; padding: 11px 14px; min-width: 0; }
  .kpi-lbl { font-size: .68rem; text-transform: uppercase; letter-spacing: .06em; color: #7d8aa0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .kpi-val { font-size: 1.7rem; font-weight: 800; line-height: 1.25; font-variant-numeric: tabular-nums; }
  .kpi-sub { font-size: .72rem; color: #8a96ac; }
  .kpi.alert { border-color: #7f1d1d; background: #1a0e12; }

  /* Body: map + side */
  .wb-body { flex: 1; display: grid; grid-template-columns: 1fr 360px; gap: 12px; padding: 0 18px 14px; min-height: 0; }
  .wb-map-wrap { position: relative; border-radius: 14px; overflow: hidden; border: 1px solid #1c2638; }
  #wbMap { position: absolute; inset: 0; }
  #wbNoKey { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 8px; background: #0e1626; color: #8a96ac; text-align: center; padding: 24px; }

  .wb-side { display: flex; flex-direction: column; gap: 12px; min-height: 0; }
  .panel { background: #0e1626; border: 1px solid #1c2638; border-radius: 14px; display: flex; flex-direction: column; min-height: 0; flex: 1; }
  .panel-h { padding: 10px 14px; font-size: .8rem; font-weight: 700; color: #aeb9cc; border-bottom: 1px solid #1c2638; display: flex; align-items: center; gap: 8px; }
  .panel-b { overflow: auto; padding: 4px 0; }
  .row { display: flex; align-items: center; gap: 9px; padding: 7px 14px; border-bottom: 1px solid #141d2e; font-size: .82rem; }
  .row:last-child { border-bottom: none; }
  .row .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .row .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .v { font-weight: 700; font-variant-numeric: tabular-nums; }
  .row .v2 { font-size: .72rem; color: #8a96ac; width: 64px; text-align: right; }
  .empty { padding: 18px; text-align: center; color: #6b7587; font-size: .8rem; }

  /* Map marker */
  .wb-stn { display: flex; align-items: center; justify-content: center; min-width: 26px; height: 22px; padding: 0 5px; border-radius: 11px; font-size: 11px; font-weight: 800; color: #fff; border: 2px solid rgba(255,255,255,.85); box-shadow: 0 1px 4px rgba(0,0,0,.6); white-space: nowrap; }
  .leg { display: flex; gap: 12px; flex-wrap: wrap; padding: 8px 14px; font-size: .7rem; color: #8a96ac; border-top: 1px solid #1c2638; }
  .leg span { display: inline-flex; align-items: center; gap: 5px; }
  .leg i { width: 16px; height: 4px; border-radius: 2px; display: inline-block; }

  @media (max-width: 1100px) {
    .wb-body { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
    .wb-side { flex-direction: row; }
    .wb-kpis { grid-auto-flow: row; grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="wb">
  <div class="wb-head">
    <div class="wb-title"><img src="logo.png" alt="UTMC"> TỔNG QUAN ĐIỀU HÀNH</div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;line-height:1.2">
      <div class="wb-clock" id="wbClock">--:--:--</div>
      <div class="wb-upd" id="wbUpd">Đang tải…</div>
    </div>
    <button class="wb-btn" onclick="loadAll()">↻ Làm mới</button>
    <button class="wb-btn" onclick="toggleFullscreen()">⛶ Toàn màn hình</button>
    <a class="wb-btn" href="/dashboard.html" style="text-decoration:none">← Dashboard</a>
  </div>

  <div class="wb-kpis" id="wbKpis"></div>

  <div class="wb-body">
    <div class="wb-map-wrap">
      <div id="wbMap"></div>
      <div id="wbNoKey">⚠ Chưa cấu hình VietMap API key.<br>Vào Admin → Settings để nhập.</div>
      <div class="leg" id="wbLeg" style="position:absolute;left:0;right:0;bottom:0;background:rgba(13,19,32,.82);backdrop-filter:blur(2px)"></div>
    </div>
    <div class="wb-side">
      <div class="panel">
        <div class="panel-h">🚦 Tuyến tắc nhất (TTI)</div>
        <div class="panel-b" id="wbRoutes"><div class="empty">—</div></div>
      </div>
      <div class="panel">
        <div class="panel-h">📊 Trạm lưu lượng cao (15')</div>
        <div class="panel-b" id="wbStations"><div class="empty">—</div></div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@vietmap/vietmap-gl-js@6.0.1/dist/vietmap-gl.js"></script>
<script src="app.js"></script>
<script>
let wbMap = null, wbKey = '', wbStnMarkers = [], wbFitted = false;
let wbAppearance = { tiers: [], noDataColor: '#6b7280' };
let wbStnTypes = [];

// ── helpers ──
function parseLatLng(s) {
  if (!s) return null;
  const p = String(s).split(',').map(x => parseFloat(x.trim()));
  if (p.length < 2 || isNaN(p[0]) || isNaN(p[1])) return null;
  return [p[1], p[0]]; // → [lng, lat] for maplibre
}
function routeCoords(r) {
  const pts = [];
  const o = parseLatLng(r.origin); if (o) pts.push(o);
  (r.waypoints ? r.waypoints.split('|') : []).forEach(w => { const c = parseLatLng(w); if (c) pts.push(c); });
  const d = parseLatLng(r.destination); if (d) pts.push(d);
  return pts;
}
function ttiColor(tti) {
  const tiers = wbAppearance.tiers || [];
  if (tti == null || !isFinite(tti) || tti <= 0) return wbAppearance.noDataColor || '#6b7280';
  // tiers ordered asc by maxTTI; maxTTI===0 is the catch-all (most severe)
  for (const t of tiers) { if (t.maxTTI > 0 && tti < t.maxTTI) return t.color; }
  for (const t of tiers) { if (!t.maxTTI || t.maxTTI <= 0) return t.color; }
  return wbAppearance.noDataColor || '#6b7280';
}
function stnTypeByID(id) { return wbStnTypes.find(t => t.id === id) || null; }
function stnColor(val, typeID) {
  const t = stnTypeByID(typeID); if (!t) return '#22c55e';
  const is15 = t.grouping === '15min';
  const r = is15 ? (t.thresh_15_red||0)    : (t.thresh_red||0);
  const o = is15 ? (t.thresh_15_orange||0) : (t.thresh_orange||0);
  const y = is15 ? (t.thresh_15_yellow||0) : (t.thresh_yellow||0);
  if (r > 0 && val >= r) return '#ef4444';
  if (o > 0 && val >= o) return '#f97316';
  if (y > 0 && val >= y) return '#eab308';
  return '#22c55e';
}
function fmtNum(n) { return (n||0) >= 1000 ? ((n/1000).toFixed(1)+'k') : String(n||0); }
function fmtDelay(sec) { sec = Math.round(sec||0); const m = Math.floor(sec/60); return m > 0 ? (m+'p '+(sec%60)+'s') : (sec+'s'); }

// ── KPI render ──
function renderKpis(d, stats, rollingTotal) {
  const tt = (d && d.travelTime) || {};
  const tr = (d && d.traffic) || {};
  const cards = [];
  cards.push(`<div class="kpi"><div class="kpi-lbl">Lưu lượng 15' (toàn mạng)</div><div class="kpi-val">${(rollingTotal||0).toLocaleString()}</div><div class="kpi-sub">lượt xe qua trạm</div></div>`);
  const avg = tt.avgTTI || 0;
  cards.push(`<div class="kpi"><div class="kpi-lbl">TTI trung bình</div><div class="kpi-val" style="color:${ttiColor(avg)}">${avg ? avg.toFixed(2) : '—'}</div><div class="kpi-sub">${tt.routeCount||0} tuyến · trễ TB ${fmtDelay(tt.avgDelaySec)}</div></div>`);
  const severe = tr.severe || 0;
  cards.push(`<div class="kpi${severe>0?' alert':''}"><div class="kpi-lbl">Điểm ùn nghiêm trọng</div><div class="kpi-val" style="color:${severe>0?'#ef4444':'#22c55e'}">${severe}</div><div class="kpi-sub">/ ${tr.persistent||0} điểm ùn</div></div>`);
  if (stats) {
    cards.push(`<div class="kpi"><div class="kpi-lbl">Camera đang phân tích</div><div class="kpi-val">${stats.cameras_analyzing||0}<span style="font-size:1rem;color:#7d8aa0">/${stats.cameras_total||0}</span></div><div class="kpi-sub">${stats.streams_active||0} luồng trực tiếp</div></div>`);
    const cpu = Math.round(stats.cpu_percent||0), mem = Math.round(stats.mem_percent||0);
    let hw = `CPU ${cpu}% · RAM ${mem}%`;
    if (stats.gpus && stats.gpus.length) hw += ` · ${stats.gpus.length} GPU`;
    cards.push(`<div class="kpi"><div class="kpi-lbl">Tải hệ thống</div><div class="kpi-val" style="color:${cpu>85?'#ef4444':(cpu>60?'#f59e0b':'#22c55e')}">${cpu}%</div><div class="kpi-sub">${hw}</div></div>`);
  }
  document.getElementById('wbKpis').textContent = '';
  document.getElementById('wbKpis').innerHTML = cards.join('');
}

// ── map ──
async function initWbMap() {
  wbMap = new vietmapgl.Map({
    container: 'wbMap',
    style: `https://maps.vietmap.vn/maps/styles/dm/style.json?apikey=${wbKey}`,
    center: [106.66, 10.78], zoom: 11, attributionControl: false,
  });
  wbMap.addControl(new vietmapgl.NavigationControl({ showCompass: false }), 'top-left');
  await new Promise(res => wbMap.on('load', res));
  // empty sources
  wbMap.addSource('wbJam', { type: 'geojson', data: emptyFC() });
  wbMap.addLayer({ id: 'wbJam', type: 'heatmap', source: 'wbJam',
    paint: {
      'heatmap-weight': ['interpolate', ['linear'], ['get', 'jf'], 0, 0, 10, 1],
      'heatmap-intensity': 1.1, 'heatmap-radius': 28, 'heatmap-opacity': 0.75,
      'heatmap-color': ['interpolate', ['linear'], ['heatmap-density'],
        0, 'rgba(0,0,0,0)', 0.3, '#22c55e', 0.55, '#eab308', 0.75, '#f97316', 1, '#ef4444'],
    } });
  wbMap.addSource('wbRoutes', { type: 'geojson', data: emptyFC() });
  wbMap.addLayer({ id: 'wbRoutes', type: 'line', source: 'wbRoutes',
    layout: { 'line-cap': 'round', 'line-join': 'round' },
    paint: { 'line-color': ['get', 'color'], 'line-width': 5, 'line-opacity': 0.9 } });
}
function emptyFC() { return { type: 'FeatureCollection', features: [] }; }

function updateMap(d, stations, summaryByCam, rolling15ByCam) {
  if (!wbMap) return;
  const allCoords = [];

  // jam heatmap
  const jam = (d && d.traffic && d.traffic.points) || [];
  wbMap.getSource('wbJam').setData({ type: 'FeatureCollection', features: jam.map(p => {
    if (isFinite(p.lat) && isFinite(p.lng)) allCoords.push([p.lng, p.lat]);
    return { type: 'Feature', properties: { jf: p.jf || 0 }, geometry: { type: 'Point', coordinates: [p.lng, p.lat] } };
  }) });

  // route corridors colored by TTI
  const routes = (d && d.travelTime && d.travelTime.routes) || [];
  wbMap.getSource('wbRoutes').setData({ type: 'FeatureCollection', features: routes.map(r => {
    const c = routeCoords(r); c.forEach(pt => allCoords.push(pt));
    return { type: 'Feature', properties: { color: ttiColor(r.latestTTI) },
      geometry: { type: 'LineString', coordinates: c } };
  }).filter(f => f.geometry.coordinates.length >= 2) });

  // station markers
  wbStnMarkers.forEach(m => m.remove()); wbStnMarkers = [];
  const curH = new Date().getHours();
  (stations || []).forEach(stn => {
    if (!isFinite(stn.lat) || !isFinite(stn.lon)) return;
    const t = stnTypeByID(stn.type_id);
    const is15 = t && t.grouping === '15min';
    const val = is15 ? (rolling15ByCam[stn.camera_id]?.count || 0)
                     : (summaryByCam[stn.camera_id]?.hour || 0);
    const el = document.createElement('div');
    el.className = 'wb-stn';
    el.style.background = stnColor(val, stn.type_id);
    el.textContent = fmtNum(val);
    el.title = (stn.label || stn.camera_id) + ' — ' + val.toLocaleString() + ' lượt';
    const mk = new vietmapgl.Marker({ element: el, anchor: 'center' }).setLngLat([stn.lon, stn.lat]).addTo(wbMap);
    wbStnMarkers.push(mk);
    allCoords.push([stn.lon, stn.lat]);
  });

  // fit once
  if (!wbFitted && allCoords.length) {
    const b = new vietmapgl.LngLatBounds(allCoords[0], allCoords[0]);
    allCoords.forEach(c => b.extend(c));
    wbMap.fitBounds(b, { padding: 60, maxZoom: 14, duration: 0 });
    wbFitted = true;
  }
}

// ── side panels ──
function renderRoutes(d) {
  const routes = ((d && d.travelTime && d.travelTime.routes) || [])
    .slice().sort((a, b) => (b.latestTTI || 0) - (a.latestTTI || 0)).slice(0, 12);
  const box = document.getElementById('wbRoutes');
  if (!routes.length) { box.innerHTML = '<div class="empty">Chưa có dữ liệu tuyến</div>'; return; }
  box.innerHTML = routes.map(r => `<div class="row">
    <span class="dot" style="background:${ttiColor(r.latestTTI)}"></span>
    <span class="nm">${escHtml(r.name || r.id)}</span>
    <span class="v" style="color:${ttiColor(r.latestTTI)}">${r.latestTTI ? r.latestTTI.toFixed(2) : '—'}</span>
    <span class="v2">+${fmtDelay(r.latestDelaySec)}</span>
  </div>`).join('');
}
function renderStations(stations, summaryByCam, rolling15ByCam) {
  const rows = (stations || []).map(stn => {
    const t = stnTypeByID(stn.type_id);
    const is15 = t && t.grouping === '15min';
    const val = is15 ? (rolling15ByCam[stn.camera_id]?.count || 0)
                     : (summaryByCam[stn.camera_id]?.hour || 0);
    return { label: stn.label || stn.camera_id, val, color: stnColor(val, stn.type_id), is15 };
  }).filter(r => r.val > 0).sort((a, b) => b.val - a.val).slice(0, 14);
  const box = document.getElementById('wbStations');
  if (!rows.length) { box.innerHTML = '<div class="empty">Chưa có dữ liệu trạm</div>'; return; }
  box.innerHTML = rows.map(r => `<div class="row">
    <span class="dot" style="background:${r.color}"></span>
    <span class="nm">${escHtml(r.label)}</span>
    <span class="v">${r.val.toLocaleString()}</span>
    <span class="v2">${r.is15 ? "15'" : '1h'}</span>
  </div>`).join('');
}

function renderLegend() {
  const tiers = (wbAppearance.tiers || []);
  let html = '<span style="font-weight:600;color:#aeb9cc">Mức TTI tuyến:</span>';
  tiers.forEach(t => { html += `<span><i style="background:${t.color}"></i>${escHtml(t.label || '')}</span>`; });
  html += '<span style="margin-left:auto">🟢🟡🟠🔴 Lưu lượng trạm · Heatmap = điểm ùn</span>';
  document.getElementById('wbLeg').innerHTML = html;
}

// ── data load ──
async function loadAll() {
  const today = (() => { const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); })();
  const [dash, appearance, types, stations, summary, rolling, stats] = await Promise.all([
    apiFetch('/api/dashboard').catch(() => null),
    apiFetch('/api/traveltime/appearance').catch(() => null),
    apiFetch('/api/counting/station-types').catch(() => []),
    apiFetch('/api/counting/stations').catch(() => []),
    apiFetch('/api/counting/summary?date=' + today).catch(() => []),
    apiFetch('/api/counting/rolling15').catch(() => []),
    apiFetch('/api/system/stats').catch(() => null),
  ]);

  if (appearance && appearance.tiers) wbAppearance = appearance;
  wbStnTypes = Array.isArray(types) ? types : [];

  const curH = new Date().getHours();
  const summaryByCam = {};
  (Array.isArray(summary) ? summary : []).forEach(s => {
    summaryByCam[s.cameraId] = { hour: (s.hours && s.hours[curH]) || 0, total: s.total || 0 };
  });
  const rolling15ByCam = {};
  let rollingTotal = 0;
  (Array.isArray(rolling) ? rolling : []).forEach(r => {
    rolling15ByCam[r.cameraId] = { count: r.count || 0, from: r.from, to: r.to };
    rollingTotal += r.count || 0;
  });

  renderKpis(dash, stats, rollingTotal);
  renderRoutes(dash);
  renderStations(stations, summaryByCam, rolling15ByCam);
  renderLegend();
  updateMap(dash, stations, summaryByCam, rolling15ByCam);

  document.getElementById('wbUpd').textContent = 'Cập nhật lúc ' + new Date().toLocaleTimeString('vi-VN');
}

function tickClock() { document.getElementById('wbClock').textContent = new Date().toLocaleTimeString('vi-VN'); }
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}

document.addEventListener('DOMContentLoaded', async () => {
  await initApp('dashboard');
  tickClock(); setInterval(tickClock, 1000);
  try {
    const settings = await apiFetch('/api/settings');
    wbKey = (settings && settings.vietmap_api_key) || '';
  } catch (_) {}
  if (!wbKey) {
    document.getElementById('wbNoKey').style.display = 'flex';
  } else {
    try { await initWbMap(); } catch (e) { console.error('map init', e); }
  }
  await loadAll();
  setInterval(loadAll, 30000);
});
</script>
</body>
</html>
